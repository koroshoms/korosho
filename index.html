<style>
:root {
  --primary: #047857; --primary-light: #10B981; --primary-dark: #065F46;
  --accent: #D97706; --accent-light: #F59E0B;
  --sidebar-bg: #0F172A; --sidebar-hover: #1E293B;
  --app-bg: #F1F5F9; --card: #FFFFFF; --text: #0F172A;
  --muted: #64748B; --border: #E2E8F0;
  --danger: #DC2626; --success: #16A34A; --warning: #F59E0B;
  --info: #0EA5E9; --purple: #9333EA;
}

/* ===== SPLASH SCREEN STYLES ===== */
.splash-screen {
  position: fixed;
  inset: 0;
  background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(6, 95, 70, 0.85)), url('students.jpg') center/cover no-repeat;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
  opacity: 1;
  transition: opacity 0.8s ease-out;
  font-family: 'Outfit', sans-serif;
  overflow: hidden;
}
.splash-screen.fade-out {
  opacity: 0;
  pointer-events: none;
}
.splash-content {
  text-align: center;
  animation: splashFadeUp 1.2s ease-out;
}
@keyframes splashFadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
.splash-logo {
  width: 110px;
  height: 110px;
  margin-bottom: 25px;
  object-fit: contain;
  filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
  /* Tumeondoa background na padding ili iwe transparent */
}
.splash-title {
  font-size: 22px;
  font-weight: 800;
  margin: 0;
  text-transform: uppercase;
  letter-spacing: 1px;
  line-height: 1.3;
  text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}
.splash-title span {
  font-size: 14px;
  font-weight: 300;
  opacity: 0.9;
  display: block;
  margin-top: 5px;
  letter-spacing: 0.5px;
}
.splash-subtitle {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 4px;
  color: #FCD34D;
  margin-top: 20px;
  margin-bottom: 40px;
  font-weight: 600;
  text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}
.splash-loader {
  width: 40px;
  height: 40px;
  border: 4px solid rgba(255,255,255,0.2);
  border-top-color: #10B981;
  border-radius: 50%;
  margin: 0 auto;
  animation: splashSpin 1s linear infinite;
}
@keyframes splashSpin {
  to { transform: rotate(360deg); }
}
.splash-footer {
  position: absolute;
  bottom: 25px;
  font-size: 11px;
  color: rgba(255,255,255,0.6);
  letter-spacing: 0.5px;
  text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}

* { font-family: 'Outfit', sans-serif; box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body { background: var(--app-bg); color: var(--text); }

.login-bg { background: linear-gradient(135deg, #0F172A 0%, #065F46 50%, #0F172A 100%); min-height: 100vh; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; padding: 20px; }
.blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.45; pointer-events: none; animation: float 14s ease-in-out infinite; }
.blob-1 { width: 520px; height: 520px; background: radial-gradient(circle, #10B981, transparent 70%); top: -160px; left: -120px; }
.blob-2 { width: 480px; height: 480px; background: radial-gradient(circle, #F59E0B, transparent 70%); bottom: -160px; right: -120px; animation-delay: -7s; }
@keyframes float { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(60px,-50px) scale(1.1); } 66% { transform: translate(-40px,40px) scale(0.95); } }
.glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
.glass-input { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; padding: 13px 16px 13px 44px; border-radius: 12px; width: 100%; font-size: 14px; transition: all 0.2s; }
.glass-input::placeholder { color: rgba(255,255,255,0.5); }
.glass-input:focus { outline: none; border-color: rgba(16,185,129,0.7); background: rgba(255,255,255,0.05); }
.input-wrap { position: relative; }
.input-wrap i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.4); }
.btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; padding: 13px 24px; border-radius: 12px; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s; font-size: 14px; }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 28px -6px rgba(4,120,87,0.5); }
.btn-ghost { background: white; color: var(--text); padding: 10px 18px; border-radius: 10px; font-weight: 500; border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; font-size: 14px; }
.btn-ghost:hover { background: #F8FAFC; border-color: #CBD5E1; }

.sidebar { width: 260px; background: var(--sidebar-bg); color: rgba(255,255,255,0.6); position: fixed; left: 0; top: 0; bottom: 0; z-index: 50; display: flex; flex-direction: column; transition: transform 0.3s; }
.sidebar-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 12px; }
.logo-icon { width: 42px; height: 42px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 18px; flex-shrink: 0; }
.nav-scroll { flex: 1; overflow-y: auto; padding: 12px; }
.nav-section { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.3); padding: 12px 16px 6px; font-weight: 600; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 10px; color: rgba(255,255,255,0.6); cursor: pointer; transition: all 0.2s; font-size: 14px; font-weight: 500; margin-bottom: 2px; border: 1px solid transparent; }
.nav-item:hover { background: var(--sidebar-hover); color: rgba(255,255,255,0.9); }
.nav-item.active { background: linear-gradient(135deg, rgba(16,185,129,0.18), rgba(4,120,87,0.08)); color: var(--primary-light); border: 1px solid rgba(16,185,129,0.3); }
.nav-item i { width: 20px; text-align: center; font-size: 15px; }
.sidebar-footer { padding: 12px; border-top: 1px solid rgba(255,255,255,0.05); }
.user-chip { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 10px; margin-bottom: 8px; }
.avatar { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-light)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 14px; flex-shrink: 0; }
.signout-btn { width: 100%; padding: 11px; background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.signout-btn:hover { background: var(--danger); color: white; border-color: var(--danger); }

.main-content { margin-left: 260px; min-height: 100vh; }
.header-bar { position: sticky; top: 0; background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 16px 32px; z-index: 40; display: flex; align-items: center; justify-content: space-between; }
.page-content { padding: 28px 32px; }

.stat-card { background: white; border-radius: 14px; padding: 22px; border: 1px solid var(--border); position: relative; overflow: hidden; transition: all 0.2s; }
.stat-card:hover { transform: translateY(-2px); box-shadow: 0 12px 30px -8px rgba(0,0,0,0.08); }
.stat-card::before { content: ''; position: absolute; top: -30px; right: -30px; width: 110px; height: 110px; border-radius: 50%; background: linear-gradient(135deg, var(--primary-light), transparent); opacity: 0.12; }
.card { background: white; border-radius: 14px; border: 1px solid var(--border); padding: 22px; }
.section-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }

.badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.badge-green { background: #DCFCE7; color: #166534; } .badge-amber { background: #FEF3C7; color: #92400E; }
.badge-red { background: #FEE2E2; color: #991B1B; } .badge-blue { background: #DBEAFE; color: #1E40AF; }
.badge-gray { background: #F1F5F9; color: #475569; } .badge-purple { background: #F3E8FF; color: #6B21A8; }

.data-table { width: 100%; border-collapse: collapse; }
.data-table thead th { background: #F8FAFC; color: var(--muted); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
.data-table tbody td { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 14px; }
.data-table tbody tr { transition: background 0.15s; }
.data-table tbody tr:hover { background: #F8FAFC; }
.data-table tbody tr:last-child td { border-bottom: none; }

.modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.65); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.active { opacity: 1; pointer-events: auto; }
.modal-box { background: white; border-radius: 16px; max-width: 540px; width: 100%; max-height: 90vh; overflow-y: auto; transform: translateY(20px); transition: transform 0.3s; }
.modal-overlay.active .modal-box { transform: translateY(0); }
.modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-body { padding: 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
.form-input { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; font-family: 'Outfit', sans-serif; background: white; color: var(--text); transition: all 0.15s; }
.form-input:focus { outline: none; border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(16,185,129,0.12); }
select.form-input { cursor: pointer; }

.toast-container { position: fixed; top: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 10px; }
.toast { background: white; border-left: 4px solid var(--success); padding: 14px 18px; border-radius: 10px; box-shadow: 0 12px 30px -6px rgba(0,0,0,0.18); display: flex; align-items: center; gap: 12px; min-width: 300px; animation: slideIn 0.3s ease-out; }
.toast.error { border-left-color: var(--danger); } .toast.info { border-left-color: var(--info); } .toast.warn { border-left-color: var(--warning); }
@keyframes slideIn { from { transform: translateX(420px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

.timetable-wrapper { overflow-x: auto; }
.timetable-grid { display: grid; gap: 0; background: #000; border: 2px solid #000; border-radius: 0; overflow: hidden; min-width: 800px; font-family: Arial, Helvetica, sans-serif; }
.tt-cell { background: white; padding: 0; min-height: 55px; font-size: 12px; border: 1px solid #000; text-align: center; display: flex; align-items: center; justify-content: center; }
.tt-header { background: #f0f0f0; font-weight: bold; color: #000; text-align: center; padding: 8px; font-size: 12px; text-transform: uppercase; border: 1px solid #000; }
.tt-time { background: #f0f0f0; font-weight: bold; color: #000; font-size: 11px; text-align: center; display: flex; align-items: center; justify-content: center; padding: 4px; border: 1px solid #000; }
.tt-class { background: #fff; border: none; padding: 4px; font-size: 12px; height: 100%; width: 100%; cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.tt-class:hover { background: #f5f5f5; }
.tt-class .subj { font-weight: 700; color: #000; }
.tt-class .tea { color: #666; font-size: 9px; margin-top: 2px; }
.tt-class-mine { background: #EFF6FF; border: none; padding: 4px; font-size: 12px; height: 100%; width: 100%; cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.tt-class-mine:hover { background: #DBEAFE; }
.tt-class-mine .subj { font-weight: 700; color: #1E40AF; }
.tt-class-mine .tea { color: #3B82F6; font-size: 9px; margin-top: 2px; }
.tt-break { background: #FFEBCD; border: 1px solid #000; border-radius: 0; padding: 4px; font-size: 12px; color: #8B4513; text-align: center; font-weight: 700; display: flex; align-items: center; justify-content: center; height: 100%; width: 100%; }
  
.notice-card { background: white; border-radius: 12px; border-left: 4px solid var(--primary); border-top: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 16px 18px; transition: all 0.2s; }
.notice-card:hover { transform: translateX(2px); box-shadow: 0 8px 20px -8px rgba(0,0,0,0.08); }
.notice-card.high { border-left-color: var(--danger); }

@keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
.fade-up-1 { animation: fadeUp 0.5s ease-out 0.05s both; } .fade-up-2 { animation: fadeUp 0.5s ease-out 0.1s both; }
.fade-up-3 { animation: fadeUp 0.5s ease-out 0.15s both; } .fade-up-4 { animation: fadeUp 0.5s ease-out 0.2s both; }
.fade-up-5 { animation: fadeUp 0.5s ease-out 0.25s both; } .fade-up-6 { animation: fadeUp 0.5s ease-out 0.3s both; }

::-webkit-scrollbar { width: 8px; height: 8px; } ::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 4px; } ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
.hidden-page { display: none !important; }

@media (max-width: 1024px) { .sidebar { transform: translateX(-100%); } .sidebar.open { transform: translateX(0); } .main-content { margin-left: 0; } }
@media (max-width: 640px) { .header-bar { padding: 14px 18px; } .page-content { padding: 18px; } }
.menu-btn { background: white; border: 1px solid var(--border); width: 40px; height: 40px; border-radius: 10px; display: none; align-items: center; justify-content: center; cursor: pointer; }
@media (max-width: 1024px) { .menu-btn { display: flex; } }
.icon-btn { width: 40px; height: 40px; background: #F8FAFC; border: 1px solid var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; transition: all 0.15s; color: var(--muted); }
.icon-btn:hover { background: white; color: var(--text); }
.icon-btn .dot { position: absolute; top: 8px; right: 9px; width: 8px; height: 8px; background: var(--danger); border-radius: 50%; border: 2px solid white; }

.q-type-card { border: 2px dashed var(--border); border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.2s; text-align: center; }
.q-type-card:hover { border-color: var(--primary-light); background: #ECFDF5; }
.q-type-card.selected { border-color: var(--primary); border-style: solid; background: #ECFDF5; }
.question-block { background: #F8FAFC; border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.question-block.collapsed { background: #f1f5f9; padding: 10px 16px; }
.progress-track { background: #E2E8F0; border-radius: 10px; height: 8px; overflow: hidden; }
.progress-fill { background: linear-gradient(90deg, var(--primary), var(--primary-light)); height: 100%; border-radius: 10px; transition: width 0.4s; }

/* ===== EXAM A4 PAGE STYLES ===== */
.a4-page { width: 210mm; height: 297mm; background: white; box-sizing: border-box; overflow: hidden; position: relative; flex-shrink: 0; display: flex; align-items: center; justify-content: center; padding: 10mm; }
.a4-page-content { width: 100%; height: 100%; box-sizing: border-box; padding: 10mm; overflow: hidden; position: relative; }
.preview-scroll-container { overflow: auto; background: #525659; border-radius: 8px; border: 1px solid var(--border); width: 100%; }
.preview-pages-wrapper { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 20px; min-width: max-content; width: max-content; margin: 0 auto; }
.preview-page-wrapper { box-shadow: 0 4px 16px rgba(0,0,0,0.3); }

/* ===== REPORT CARD A4 PIXEL PERFECT STYLES ===== */
.rep-page-container { background: #525659; padding: 20px; border-radius: 8px; overflow: auto; display: flex; justify-content: center; }
.rep-a4-sheet { width: 210mm; height: 297mm; background: white; box-shadow: 0 4px 16px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; padding: 8mm; box-sizing: border-box; flex-shrink: 0; overflow: hidden; }
.rep-border-outer { border: 4px solid #000; width: 100%; height: 100%; padding: 2mm; box-sizing: border-box; }
.rep-border-inner { border: 1px solid #000; width: 100%; height: 100%; padding: 4mm; box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; font-size: 10pt; color: #000; display: flex; flex-direction: column; }
.rep-header { display: flex; align-items: center; margin-bottom: 3mm; }
.rep-logo { width: 60px; height: 60px; object-fit: contain; margin-right: 5mm; flex-shrink: 0; }
.rep-school-info { flex: 1; text-align: center; }
.rep-school-info h1 { font-size: 14pt; font-weight: bold; margin: 0; text-transform: uppercase; line-height: 1.2; }
.rep-school-info p { margin: 0.5mm 0; font-weight: bold; font-size: 10pt; }
.rep-school-info a { color: blue; text-decoration: underline; }
.rep-title { text-align: center; margin: 2mm 0; }
.rep-title h2 { font-size: 12pt; font-weight: bold; margin: 0; text-transform: uppercase; }
.rep-title h3 { font-size: 11pt; font-weight: bold; margin: 0.5mm 0 0 0; text-transform: uppercase; }
.rep-student-info { display: flex; justify-content: space-between; margin-bottom: 2mm; font-size: 10pt; padding: 0 1mm; }
.rep-student-info b { font-weight: bold; }
.rep-section-title { font-weight: bold; font-size: 11pt; margin: 2mm 0 1mm 0; }
.rep-table { width: 100%; border-collapse: collapse; margin-bottom: 2mm; font-size: 9pt; }
.rep-table th, .rep-table td { border: 1px solid #000; padding: 1.2mm; text-align: center; }
.rep-table th { background: #e6e6e6; font-weight: bold; }
.rep-table td.rep-subj { text-align: left; }
.rep-table td.rep-comment { text-align: left; font-size: 8pt; }
.rep-legend { font-size: 8pt; margin-bottom: 2mm; font-weight: bold; text-align: center; }
.rep-instructions { font-size: 9pt; padding-left: 4mm; margin: 0; }
.rep-instructions li { margin-bottom: 1mm; }
.rep-signatures { display: flex; justify-content: space-between; margin-top: 5mm; font-size: 9pt; font-weight: bold; }
 
  /* ===== DARK MODE STYLES ===== */
body.dark-mode { background: #0F172A; color: #E2E8F0; }
body.dark-mode .card { background: #1E293B; border-color: #334155; }
body.dark-mode .stat-card { background: #1E293B; border-color: #334155; }
body.dark-mode .stat-card::before { background: linear-gradient(135deg, #10B981, transparent); opacity: 0.2; }
body.dark-mode .text-slate-900, body.dark-mode .text-slate-800 { color: #F1F5F9 !important; }
body.dark-mode .text-slate-700, body.dark-mode .text-slate-600 { color: #CBD5E1 !important; }
body.dark-mode .text-slate-500 { color: #94A3B8 !important; }
body.dark-mode .form-input { background: #0F172A; border-color: #334155; color: white; }
body.dark-mode .btn-ghost { background: #1E293B; border-color: #334155; color: #E2E8F0; }
body.dark-mode .btn-ghost:hover { background: #334155; }

body.dark-mode .notice-card { background: #1E293B; border-color: #334155; }
body.dark-mode .question-block { background: #1E293B; border-color: #334155; }
body.dark-mode .tt-class { background: #1E293B; }
body.dark-mode .tt-class .subj { color: #F1F5F9; }
body.dark-mode .tt-class .tea { color: #94A3B8; }
body.dark-mode .tt-header, body.dark-mode .tt-time { background: #0F172A; color: #F1F5F9; border-color: #334155; }
body.dark-mode .tt-cell { background: #1E293B; border-color: #334155; }
body.dark-mode .modal-box { background: #1E293B; }
body.dark-mode .modal-header { border-color: #334155; }
body.dark-mode .modal-footer { border-color: #334155; }
body.dark-mode .tt-class-mine { background: #0F172A; }

function getBorderCSS(style) {
  switch(style) {
    case 'none': return 'border: none;';
    case 'simple-box': return 'border: 1px solid #000;';
    case 'double-box': return 'border: 3px double #000;';
    case 'shadow-box': return 'border: 1px solid #000; box-shadow: 4px 4px 8px rgba(0,0,0,0.4);';
    case '3d-box': return 'border: 2px outset #888;';
    case 'triple-line': return 'border: 1px solid #000; box-shadow: 0 0 0 3px #fff, 0 0 0 4px #000;';
    case 'dashed-box': return 'border: 2px dashed #000;';
    case 'dotted-box': return 'border: 2px dotted #000;';
    default: return 'border: 3px double #000;';
  }
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const submitBtn = e.target.querySelector('button[type="submit"]');
  const errorBox = document.getElementById('loginErrorBox');
  if (errorBox) { errorBox.classList.add('hidden'); errorBox.innerText = ''; }
  submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing In...';
  submitBtn.disabled = true;
  try {
    const { data: authData, error: authError } = await supabase.auth.signInWithPassword({ email, password });
    if (authError) throw new Error(authError.message);
    let { data: profile, error: profileError } = await supabase.from('profiles').select('*').eq('id', authData.user.id).single();
    if (profileError && profileError.code === 'PGRST116') {
      const { data: newProfile, error: insertError } = await supabase.from('profiles').insert([{ id: authData.user.id, full_name: email.split('@')[0], role: 'admin', email: email }]).select().single();
      if (insertError) throw new Error('Could not create user profile: ' + insertError.message);
      profile = newProfile;
    } else if (profileError) { throw new Error('Database Error: ' + profileError.message); }
    state.currentUser = { id: authData.user.id, username: email, name: profile.full_name || email.split('@')[0], role: profile.role || 'admin' };
    document.getElementById('loginPage').classList.add('hidden-page');
    document.getElementById('appShell').classList.remove('hidden-page');
    await initApp();
    showToast(`Welcome back, ${state.currentUser.name.split(' ')[0]}!`, 'success');
  } catch (err) {
    document.getElementById('loginPage').classList.remove('hidden-page');
    document.getElementById('appShell').classList.add('hidden-page');
    if (errorBox) { errorBox.innerText = "Login Failed: " + err.message; errorBox.classList.remove('hidden'); }
    submitBtn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Sign In to Portal';
    submitBtn.disabled = false;
    await supabase.auth.signOut();
  }
});

async function checkSession() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    try {
      const { data: profile } = await supabase.from('profiles').select('*').eq('id', session.user.id).single();
      if (profile) {
        state.currentUser = { id: session.user.id, username: session.user.email, name: profile.full_name, role: profile.role };
        document.getElementById('loginPage').classList.add('hidden-page');
        document.getElementById('appShell').classList.remove('hidden-page');
        await initApp();
      }
    } catch (e) { console.error("Session check error", e); }
  }
}

async function logout() {
  await supabase.auth.signOut();
  state.currentUser = null;
  document.getElementById('appShell').classList.add('hidden-page');
  document.getElementById('loginPage').classList.remove('hidden-page');
  document.getElementById('loginForm').reset();
  showToast('Signed out successfully', 'info');
}

async function fetchAllData() {
  let profilesMap = {};
  try {
    const { data: profiles, error: pErr } = await supabase.from('profiles').select('*');
    if (pErr) throw pErr;
    state.teachers = profiles.filter(p => ['teacher', 'academic', 'headteacher', 'admin'].includes(p.role)) || [];
    profiles.forEach(p => { profilesMap[p.id] = p; });
  } catch (e) { console.warn("Profiles fetch failed:", e.message); state.teachers = []; }
  try {
    const { data: classes, error: cErr } = await supabase.from('classes').select('*');
    if (cErr) throw cErr;
    state.classes = (classes || []).map(c => ({ ...c, profiles: c.class_teacher_id ? profilesMap[c.class_teacher_id] : null }));
  } catch (e) { console.warn("Classes fetch failed:", e.message); state.classes = []; }
  try {
    const { data: subjects, error: sErr } = await supabase.from('subjects').select('*');
    if (sErr) throw sErr;
    state.subjects = (subjects || []).map(s => ({ ...s, profiles: s.teacher_id ? profilesMap[s.teacher_id] : null }));
  } catch (e) { console.warn("Subjects fetch failed:", e.message); state.subjects = []; }
  try {
    const { data: students, error: stErr } = await supabase.from('students').select('*');
    if (stErr) throw stErr;
    const classesMap = {};
    state.classes.forEach(c => classesMap[c.id] = c);
    state.students = (students || []).map(st => ({ ...st, classes: st.class_id ? classesMap[st.class_id] : null }));
  } catch (e) { console.warn("Students fetch failed:", e.message); state.students = []; }
  try {
    const { data: notices, error: nErr } = await supabase.from('notices').select('*').order('created_at', { ascending: false });
    if (nErr) throw nErr;
    state.notices = (notices || []).map(n => ({ ...n, profiles: n.author_id ? profilesMap[n.author_id] : null }));
  } catch (e) { console.warn("Notices fetch failed:", e.message); state.notices = []; }
  try {
    const { data: exams, error: eErr } = await supabase.from('exams').select('*, classes(name), subjects(name), profiles(full_name)').order('created_at', { ascending: false });
    if (eErr) throw eErr;
    state.exams = exams || [];
  } catch (e) { console.warn("Exams fetch failed:", e.message); state.exams = []; }
  try {
    const { data: results, error: rErr } = await supabase.from('results').select('*');
    if (rErr) throw rErr;
    state.results = results || [];
  } catch (e) { console.warn("Results fetch failed:", e.message); state.results = []; }
  
    try {
    const { data: classSubjects, error: csErr } = await supabase.from('class_subjects').select('*');
    if (csErr) throw csErr;
    state.classSubjects = classSubjects || [];
  } catch (e) { console.warn("Class Subjects fetch failed:", e.message); state.classSubjects = []; }
  
  try {
    const { data: classSubjects, error: csErr } = await supabase.from('class_subjects').select('*');
    if (csErr) throw csErr;
    state.classSubjects = classSubjects || [];
  } catch (e) { console.warn("Class Subjects fetch failed:", e.message); state.classSubjects = []; }
  
  try {
    const { data: ttStatus, error: ttsErr } = await supabase.from('timetable_status').select('*');
    if (ttsErr) throw ttsErr;
    state.timetableStatus = ttStatus || [];
  } catch (e) { console.warn("Timetable Status fetch failed:", e.message); state.timetableStatus = []; }
  
  loadReportDataLocally();
  
  if (!state.timetable) generateTimetable();
}

async function initApp() {
  const u = state.currentUser;
  const initials = u.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('sideAvatar').textContent = initials;
  document.getElementById('sideName').textContent = u.name;
  document.getElementById('sideRole').textContent = u.role;
  document.getElementById('headerAvatar').textContent = initials;
  document.getElementById('headerName').textContent = u.name;
  document.getElementById('headerRole').textContent = u.role;
  await fetchAllData();
  buildNav();
  navigateTo('dashboard');
  supabase.channel('public:published_results')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'published_reports' }, async payload => {
      if (state.currentPage === 'results') { await checkPublishStatus(); await loadNectaReport(); }
      if (state.currentPage === 'reports' && state.selectedReportClassId) { await checkReportPublishStatus(); renderPage(); }
    }).subscribe();
  supabase.channel('public:results')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'results' }, async payload => {
      if (state.currentPage === 'results') { await fetchAllData(); await loadNectaReport(); }
    }).subscribe();
}

function buildNav() {
  let menu = NAV_MENUS[state.currentUser.role] || NAV_MENUS['admin'];
  
  // Ficha kitufe cha "My Students" kwa walimu wasiopangiwa kuwa Walimu wa Darasa
  if (state.currentUser.role === 'teacher') {
    const isClassTeacher = state.classes.some(c => c.class_teacher_id === state.currentUser.id);
    if (!isClassTeacher) {
      menu = menu.filter(item => item.id !== 'students');
    }
  }

  const host = document.getElementById('navMenu');
  host.innerHTML = menu.map(item => {
    if (item.section) return `<div class="nav-section">${item.section}</div>`;
    return `<div class="nav-item" data-page="${item.id}" onclick="navigateTo('${item.id}')"><i class="fa-solid ${item.icon}"></i><span>${item.label}</span></div>`;
  }).join('');
}

function navigateTo(page) {
  // Weka historia kwenye browser ili back button ya simu ifanye kazi
  if (state.currentPage !== page) {
    history.pushState({ page: page }, '', `#${page}`);
  }
  
  state.currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
  const menu = NAV_MENUS[state.currentUser.role] || NAV_MENUS['admin'];
  const item = menu.find(m => m.id === page);
  document.getElementById('pageTitle').textContent = item ? item.label : 'Dashboard';
  document.getElementById('pageBreadcrumb').textContent = `Home / ${item ? item.label : 'Dashboard'}`;
  renderPage();
  if (window.innerWidth <= 1024) {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    sidebar.classList.remove('open');
    if (overlay) {
      overlay.style.opacity = '0';
      overlay.style.pointerEvents = 'none';
    }
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Function kusikiliza back button za simu
window.addEventListener('popstate', (event) => {
  if (event.state && event.state.page) {
    state.currentPage = event.state.page;
    document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === event.state.page));
    const menu = NAV_MENUS[state.currentUser.role] || NAV_MENUS['admin'];
    const item = menu.find(m => m.id === event.state.page);
    document.getElementById('pageTitle').textContent = item ? item.label : 'Dashboard';
    document.getElementById('pageBreadcrumb').textContent = `Home / ${item ? item.label : 'Dashboard'}`;
    renderPage();
  } else {
    // Kama hakuna historia, rudisha dashboard
    if (state.currentPage !== 'dashboard') {
      navigateTo('dashboard');
    }
  }
});

function toggleSidebar() { 
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  
  sidebar.classList.toggle('open');
  
  if (sidebar.classList.contains('open')) {
    overlay.style.opacity = '1';
    overlay.style.pointerEvents = 'auto';
  } else {
    overlay.style.opacity = '0';
    overlay.style.pointerEvents = 'none';
  }
}

function renderTeacherTodaySchedule(user) {
  const today = new Date().toLocaleDateString('en-US', { weekday: 'long' });
  if (!['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'].includes(today)) return '<p class="text-sm text-slate-500">No school today.</p>';
  
  const sessions = [];
  
  // Pata madarasa yote ambayo mwalimu amepangiwa kufundisha
  const myClassIds = [...new Set(state.classSubjects.filter(a => a.teacher_id === user.id).map(a => a.class_id))];
  
  myClassIds.forEach(classId => {
    // Hakikisha ratiba ya darasa hilo imetengenezwa
    let tt = state.timetables && state.timetables[classId] ? state.timetables[classId] : generateTimetable(classId);
    if (tt) {
      tt.timeSlots.forEach((slot, sIdx) => {
        if (slot.type === 'break') return;
        const cell = tt.cells[`${today}-${sIdx}`];
        // Kama kipindi hiki mwalimu ndiye anafundisha, ongeza kwenye orodha
        if (cell && cell.type === 'lesson' && cell.teaId === user.id) {
          const cls = state.classes.find(c => c.id == classId);
          sessions.push({ ...cell, time: slot.time, sIdx, className: cls ? cls.name : '' });
        }
      });
    }
  });

  // Panga kipindi kufuatana na muda
  sessions.sort((a, b) => a.sIdx - b.sIdx);

  if (sessions.length === 0) return '<p class="text-sm text-slate-500">You have no teaching sessions today.</p>';
  
  const now = new Date();
  const currentMins = now.getHours() * 60 + now.getMinutes();
  
  return `<div class="space-y-2">${sessions.map(s => {
    const [start, end] = s.time.split(' - ');
    const [sh, sm] = start.split(':').map(Number);
    const [eh, em] = end.split(':').map(Number);
    const startMins = sh * 60 + sm;
    const endMins = eh * 60 + em;
    
    let status = { label: 'Upcoming', color: 'gray', icon: 'fa-clock' };
    if (currentMins > endMins) status = { label: 'Completed', color: 'green', icon: 'fa-check-circle' };
    else if (currentMins >= startMins && currentMins <= endMins) status = { label: 'In Progress', color: 'amber', icon: 'fa-spinner fa-spin' };
    
    return `<div class="flex items-center gap-3 p-3 rounded-lg border ${status.color === 'amber' ? 'bg-amber-50' : status.color === 'green' ? 'bg-green-50' : 'bg-slate-50'}" style="border-color:var(--border)">
      <div class="text-xs font-mono font-bold w-20 text-slate-600">${s.time}</div>
      <div class="flex-1">
        <div class="font-semibold text-sm">${s.subj} <span class="text-xs text-slate-500">(${s.className})</span></div>
        <div class="text-xs text-slate-500">Period ${s.sIdx + 1}</div>
      </div>
      <div class="badge badge-${status.color}"><i class="fa-solid ${status.icon} mr-1"></i> ${status.label}</div>
    </div>`;
  }).join('')}</div>`;
}

          <button class="btn-ghost w-full mt-auto" onclick="openModal('assignSubjectTeacher', ${s.id})"><i class="fa-solid fa-user-pen mr-1"></i> ${s.teacher_id ? 'Change Teacher' : 'Assign Teacher'}</button>
        </div>`;

}

function generateTimetable(classId) {
  if (!classId) return null;
  
  const days = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
  const timeSlots = [
    { time: '08:20 - 09:00', type: 'lesson' }, { time: '09:00 - 09:40', type: 'lesson' },
    { time: '09:40 - 10:20', type: 'lesson' },
    { time: '10:20 - 10:40', type: 'break', label: 'BREAKFAST BREAK' },
    { time: '10:40 - 11:20', type: 'lesson' }, { time: '11:20 - 12:00', type: 'lesson' },
    { time: '12:00 - 12:40', type: 'lesson' },
    { time: '12:40 - 13:20', type: 'break', label: 'LUNCH BREAK' },
    { time: '13:20 - 14:00', type: 'lesson' }, { time: '14:00 - 14:40', type: 'lesson' },
    { time: '14:40 - 15:20', type: 'lesson' }
  ];
  
  const teachers = state.teachers || [];
  const classAssignments = state.classSubjects.filter(a => a.class_id == classId);
  
    let blocks = [];
  
  // 1. Ingiza masomo yaliyopangiwa kwenye 'Subject Assignments'
  classAssignments.forEach(a => {
    const subject = state.subjects.find(s => s.id == a.subject_id);
    if (!subject) return;
    
    const pPw = a.periods_per_week || 0;
    const dPw = a.double_periods_per_week || 0;
    const sPw = pPw - (2 * dPw);
    
    for (let i = 0; i < dPw; i++) {
      if (a.teacher_id) blocks.push({ subjectId: subject.id, size: 2, teacherId: a.teacher_id });
    }
    for (let i = 0; i < sPw; i++) {
      if (a.teacher_id) blocks.push({ subjectId: subject.id, size: 1, teacherId: a.teacher_id });
    }
    });

  // 2. Ingiza masomo yote iliyowekwa kwenye 'Add Subject' kwa darasa hili (ikiwa haijaingizwa)
  state.subjects.forEach(sub => {
    if (sub.class_ids && sub.class_ids.includes(parseInt(classId))) {
      const alreadyExists = blocks.some(b => b.subjectId === sub.id);
      if (!alreadyExists) {
        // Tafuta mwalimu kwenye assignments, au tumia mwalimu wa kawaida wa somo hilo
        const assignment = classAssignments.find(a => a.subject_id === sub.id);
        const teacherId = assignment ? assignment.teacher_id : (sub.teacher_id || null);
        blocks.push({ subjectId: sub.id, size: 1, teacherId: teacherId });
      }
    }
  });
  
  for(let i=blocks.length-1; i>0; i--){ const j = Math.floor(Math.random()*(i+1)); [blocks[i],blocks[j]] = [blocks[j],blocks[i]]; }
  
  const timetable = { days, timeSlots, cells: {} };
  
  days.forEach(day => {
    timeSlots.forEach((slot, sIdx) => {
      const key = `${day}-${sIdx}`;
      if (slot.type === 'break') {
        timetable.cells[key] = { type: 'break', label: slot.label };
      } else {
        timetable.cells[key] = { type: 'lesson', subj: 'Free', subjId: null, tea: '—', teaId: null };
      }
    });
  });
  
  let remainingBlocks = [...blocks];
  let daysTaught = {};
  
  days.forEach(day => {
    for (let s = 0; s < timeSlots.length; s++) {
      if (remainingBlocks.length === 0) break;
      
      const slot = timeSlots[s];
      if (slot.type !== 'lesson') continue;
      
      const key = `${day}-${s}`;
      if (timetable.cells[key].subjId !== null) continue;
      
      for (let b = 0; b < remainingBlocks.length; b++) {
        const block = remainingBlocks[b];
        const daySubjKey = `${day}-${block.subjectId}`;
        
        // Sheria 1: Somo lisiwejwe mara mbili siku hiyo hiyo
        if (daysTaught[daySubjKey]) continue;
        
        const teacherId = block.teacherId;
        const teacherSlotKey = `${day}-${s}`;
        
        // Sheria 2 (MASTER): Mwalimu asifundishe madarasa mawili wakati mmoka
        if (teacherId && state.teacherSchedules[teacherId] && state.teacherSchedules[teacherId][teacherSlotKey]) {
          continue; 
        }
        
        const subject = state.subjects.find(sub => sub.id === block.subjectId);
        const teacher = teachers.find(t => t.id === teacherId);
        const cellData = { type: 'lesson', subj: subject.code || subject.name, subjId: subject.id, tea: teacher ? teacher.full_name : '—', teaId: teacher ? teacher.id : null };
        
        if (block.size === 2) {
          if (s + 1 >= timeSlots.length) continue;
          const nextSlot = timeSlots[s+1];
          if (nextSlot.type !== 'lesson') continue;
          const nextKey = `${day}-${s+1}`;
          if (timetable.cells[nextKey].subjId !== null) continue;
          
          const teacherNextSlotKey = `${day}-${s+1}`;
          if (teacherId && state.teacherSchedules[teacherId] && state.teacherSchedules[teacherId][teacherNextSlotKey]) {
            continue;
          }
          
          timetable.cells[key] = cellData;
          timetable.cells[nextKey] = cellData;
          daysTaught[daySubjKey] = true;
          remainingBlocks.splice(b, 1);
          
          // Mwone kwenye Master Schedule kama yeye anafundisha
          if (teacherId) {
            if (!state.teacherSchedules[teacherId]) state.teacherSchedules[teacherId] = {};
            state.teacherSchedules[teacherId][teacherSlotKey] = true;
            state.teacherSchedules[teacherId][teacherNextSlotKey] = true;
          }
          break;
        } else {
          timetable.cells[key] = cellData;
          daysTaught[daySubjKey] = true;
          remainingBlocks.splice(b, 1);
          
          if (teacherId) {
            if (!state.teacherSchedules[teacherId]) state.teacherSchedules[teacherId] = {};
            state.teacherSchedules[teacherId][teacherSlotKey] = true;
          }
          break;
        }
      }
    }
  });
  
  // Kama bado kuna blocks zilizobaki, zibweke kwenye nafasi zilizosalia bila kuvuruga uwepo wa walimu
  remainingBlocks.forEach(block => {
    const subject = state.subjects.find(sub => sub.id === block.subjectId);
    const teacher = teachers.find(t => t.id === block.teacherId);
    const cellData = { type: 'lesson', subj: subject.code || subject.name, subjId: subject.id, tea: teacher ? teacher.full_name : '—', teaId: teacher ? teacher.id : null };
    
    for (let d = 0; d < days.length; d++) {
      for (let s = 0; s < timeSlots.length; s++) {
        const slot = timeSlots[s];
        if (slot.type !== 'lesson') continue;
        const key = `${days[d]}-${s}`;
        const tKey = `${days[d]}-${s}`;
        
        if (timetable.cells[key].subjId === null) {
          if (block.size === 2) {
            if (s + 1 >= timeSlots.length) continue;
            const nextSlot = timeSlots[s+1];
            if (nextSlot.type !== 'lesson') continue;
            const nextKey = `${days[d]}-${s+1}`;
            if (timetable.cells[nextKey].subjId !== null) continue;
            const tNextKey = `${days[d]}-${s+1}`;
            if (block.teacherId && state.teacherSchedules[block.teacherId] && (state.teacherSchedules[block.teacherId][tKey] || state.teacherSchedules[block.teacherId][tNextKey])) continue;
            
            timetable.cells[key] = cellData;
            timetable.cells[nextKey] = cellData;
            if (block.teacherId) {
              if (!state.teacherSchedules[block.teacherId]) state.teacherSchedules[block.teacherId] = {};
              state.teacherSchedules[block.teacherId][tKey] = true;
              state.teacherSchedules[block.teacherId][tNextKey] = true;
            }
            return;
          } else {
            if (block.teacherId && state.teacherSchedules[block.teacherId] && state.teacherSchedules[block.teacherId][tKey]) continue;
            
            timetable.cells[key] = cellData;
            if (block.teacherId) {
              if (!state.teacherSchedules[block.teacherId]) state.teacherSchedules[block.teacherId] = {};
              state.teacherSchedules[block.teacherId][tKey] = true;
            }
            return;
          }
        }
      }
    }
  });
  
  state.timetables[classId] = timetable;
  return timetable;
}

    <div class="section-title">
      <span><i class="fa-solid fa-table-cells-large text-emerald-600 mr-2"></i> Master Timetable</span>

function printTimetable() {
  const printArea = document.getElementById('timetable-print-area');
  if (!printArea) return showToast('No timetable data to print.', 'error');

  const fullHTML = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Print Timetable</title>
<style>
  @page { size: landscape; margin: 10mm; }
  body { font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 20px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { border: 1px solid #000; padding: 8px; font-size: 11px; text-align: center; vertical-align: middle; }
</style>
</head>
<body>
  ${printArea.innerHTML}
  <script>
    window.onload = function() { window.print(); };
  <\/script>
</body>
</html>`;

  const blob = new Blob([fullHTML], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.target = '_blank';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 2000);
  }

function saveTimetableTimeSlot(sIdx) {
  const tt = state.timetables[state.timetableClassId];
  if (!tt) return;
  
  const time = document.getElementById('tt-time-input').value;
  if (!time) return showToast('Time cannot be empty', 'error');
  
  const isBreak = document.querySelector('input[name="slotType"]:checked').value === 'break';
  const label = document.getElementById('tt-break-label').value.trim().toUpperCase();
  
  tt.timeSlots[sIdx].time = time;
  
  if (isBreak) {
    tt.timeSlots[sIdx].type = 'break';
    tt.timeSlots[sIdx].label = label || 'BREAK';
    tt.days.forEach(day => {
      tt.cells[`${day}-${sIdx}`] = { type: 'break', label: tt.timeSlots[sIdx].label };
    });
  } else {
    tt.timeSlots[sIdx].type = 'lesson';
    delete tt.timeSlots[sIdx].label;
    tt.days.forEach(day => {
      tt.cells[`${day}-${sIdx}`] = { type: 'lesson', subj: 'Free', subjId: null, tea: '—', teaId: null };
    });
  }
  
  closeModal(); renderPage(); showToast('Time slot updated for all days', 'success');
}

}

function addTimetableColumn() {
  const tt = state.timetables[state.timetableClassId];
  if (!tt) return;
  const lastIdx = tt.timeSlots.length - 1;
  const lastTime = tt.timeSlots[lastIdx].time.split(' - ')[1];
  let [h, m] = lastTime.split(':').map(Number);
  m += 40;
  if (m >= 60) { h += Math.floor(m/60); m = m % 60; }
  const newTime = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  tt.timeSlots.push({ time: `${lastTime} - ${newTime}`, type: 'lesson' });
  const newPeriodIdx = tt.timeSlots.length - 1;
  tt.days.forEach(day => {
    tt.cells[`${day}-${newPeriodIdx}`] = { type: 'lesson', subj: 'Free', subjId: null, tea: '—', teaId: null };
  });
  renderPage(); showToast('New period column added', 'success');
}

function addTimetableRow() {
  const tt = state.timetables[state.timetableClassId];
  if (!tt) return;
  const nextDay = tt.days.length;
  const days = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  if (nextDay >= days.length) return showToast('No more days to add', 'error');
  const dayName = days[nextDay];
  tt.days.push(dayName);
  tt.timeSlots.forEach((slot, sIdx) => {
    const key = `${dayName}-${sIdx}`;
    if (slot.type === 'break') {
      tt.cells[key] = { type: 'break', label: slot.label };
    } else {
      tt.cells[key] = { type: 'lesson', subj: 'Free', subjId: null, tea: '—', teaId: null };
    }
  });
  renderPage(); showToast(`${dayName} added to timetable`, 'success');
}

function saveTimetableCell(day, sIdx, subjId, teaId) {
  const key = `${day}-${sIdx}`;
  const tt = state.timetables[state.timetableClassId];
  if (!tt) return;

function getGpa(g) { return {A:1,B:2,C:3,D:4,E:5}[g] || 5; }
function formatSubjectName(name) { const map = { "Historia ya Tanzania na Maadili": "HIST.TZ", "Geography and the environment": "GEOGRAPHY", "Arts and Sports": "ARTS & SPORTS" }; return map[name] || name; }

async function onResultsClassChange() {
  currentResClass = document.getElementById('res-class-select').value;

async function checkPublishStatus() {
  if (!currentResClass) return;
  const { data } = await supabase.from('published_reports').select('*').eq('class_id', currentResClass).maybeSingle();
  isResPublished = data?.is_published || false;
  const pubBtn = document.getElementById('publishBtn');
  if (pubBtn) pubBtn.innerText = isResPublished ? 'UNPUBLISH' : 'PUBLISH';
  const statusEl = document.getElementById('res-status');
  if (!statusEl) return;
  if (state.currentUser.role === 'teacher' && !isResPublished) statusEl.innerHTML = '<span style="color:red; font-weight:bold;">⚠ RESULTS ARE NOT YET READY! | CONTACT THE ACADEMIC TEACHER: +255613 367 354</span>';
  else if (isResPublished) statusEl.innerHTML = '<span style="color:green; font-weight:bold;">✅ RESULTS ARE PUBLIC NOW</span>';
  else statusEl.innerHTML = '';
}

async function togglePublish() {
  if (!currentResClass) return;
  const newState = !isResPublished;
  const { error } = await supabase.from('published_reports').upsert({ class_id: currentResClass, is_published: newState }, { onConflict: 'class_id' });
  if (error) return showToast(error.message, 'error');
  await checkPublishStatus(); await loadNectaReport();
  showToast(newState ? 'Results Published' : 'Results Unpublished', 'success');
}

async function loadNectaReport() {
  const dash = document.getElementById('necta-dashboard');
  if (!dash) return;
  if (!currentResClass) { dash.innerHTML = '<p class="text-slate-500 text-center py-6">Select a class to view results.</p>'; return; }
  if (state.currentUser.role === 'teacher' && !isResPublished) { dash.innerHTML = '<p class="text-red-500 text-center py-6 font-bold">Results not published yet.</p>'; return; }
  try {
    const students = state.students.filter(s => String(s.class_id) === String(currentResClass)).sort((a, b) => {
      if ((a.gender || "Male") !== (b.gender || "Male")) return (a.gender === "Female") ? 1 : -1;
      return (a.admission_no || a.name || "").localeCompare(b.admission_no || b.name || "");
    });
    let final = [];
    let gradePerf = { Male:{A:0,B:0,C:0,D:0,E:0}, Female:{A:0,B:0,C:0,D:0,E:0} };
    students.forEach(stu => {
      let total = 0, count = 0, detail = [];
      state.subjects.forEach(sub => {
        let r = state.results.find(x => String(x.student_id) === String(stu.id) && String(x.subject_id) === String(sub.id));
        if (!r) return;
        let m = Number(r.marks); total += m; count++;
        detail.push(formatSubjectName(sub.name) + " - " + getGrade(m));
      });
      if (count === 0) return;
      let avg = total / count; let g = getGrade(avg);
      detail.push("Average - " + g);
      let genderKey = (stu.gender === "F" || stu.gender === "Female") ? "Female" : "Male";
      gradePerf[genderKey][g]++;
      final.push({ adm: stu.admission_no || 'N/A', prem: stu.prem_no || 'N/A', name: stu.name || "-", sex: (stu.gender === "F" || stu.gender === "Female") ? "F" : "M", detail: detail.join(", ") });
    });
    const thStyle = 'border:2px solid #000; padding:5px; background:#e6e6e6; text-align:left;';
    const tdStyle = 'border:2px solid #000; padding:5px;';
    let gradePerfHtml = Object.entries(gradePerf).map(([k,v]) => `<tr><td style="${tdStyle}">${k}</td><td style="${tdStyle}">${v.A}</td><td style="${tdStyle}">${v.B}</td><td style="${tdStyle}">${v.C}</td><td style="${tdStyle}">${v.D}</td><td style="${tdStyle}">${v.E}</td></tr>`).join("");
    let tbodyHtml = final.length === 0 ? `<tr><td colspan="5" style="${tdStyle} text-align:center;">NO STUDENTS DATA</td></tr>` : final.map(r => `<tr><td style="${tdStyle}">${r.adm}</td><td style="${tdStyle}">${r.prem}</td><td style="${tdStyle}">${r.name}</td><td style="${tdStyle}">${r.sex}</td><td style="${tdStyle}">${r.detail}</td></tr>`).join("");
    let subjectStats = state.subjects.map(sub => {
      let st = state.results.filter(r => { if (String(r.subject_id) !== String(sub.id)) return false; return students.some(s => String(s.id) === String(r.student_id)); });
      if (st.length === 0) return null;
      let total = st.reduce((a,b) => a + Number(b.marks), 0);
      let avg = total / st.length;
      return { name: sub.name, sat: st.length, passed: st.filter(x => x.marks >= 41).length, avg };
    }).filter(Boolean);
    let subtbodyHtml = subjectStats.length === 0 ? `<tr><td colspan="7" style="${tdStyle} text-align:center;">NO SUBJECT PERFORMANCE DATA</td></tr>` : subjectStats.map((sub, i) => {
      let g = getGrade(sub.avg);
      let bgColor = "#fff", color = "#000";
      if(g==="A"){bgColor="#006400";color="#fff";} else if(g==="B"){bgColor="#90EE90";color="#000";} else if(g==="C"){bgColor="#FFFF66";color="#000";} else if(g==="D"){bgColor="#FFB6B6";color="#000";} else if(g==="E"){bgColor="#FF0000";color="#fff";}
      let gpaStyle = `border:2px solid #000; padding:5px; background:${bgColor}; color:${color}; text-align:center; font-weight:bold;`;
      return `<tr><td style="${tdStyle}">${i+1}</td><td style="${tdStyle}">${sub.name}</td><td style="${tdStyle}">${sub.sat}</td><td style="${tdStyle}">${sub.sat}</td><td style="${tdStyle}">${sub.passed}</td><td style="${tdStyle}">${sub.avg.toFixed(1)}</td><td style="${gpaStyle}">${g}</td></tr>`;
    }).join("");
    dash.innerHTML = `
      <div style="margin-bottom: 20px;"><h3 style="font-weight: bold; margin-bottom: 5px;">GRADE PERFORMANCE</h3>
        <table style="width: 100%; border-collapse: collapse; font-size: 12px; background: #fff; border: 2px solid #000;">
          <thead><tr><th style="${thStyle}">SEX</th><th style="${thStyle}">A</th><th style="${thStyle}">B</th><th style="${thStyle}">C</th><th style="${thStyle}">D</th><th style="${thStyle}">E</th></tr></thead>
          <tbody>${gradePerfHtml}</tbody>
        </table>
      </div>
      <div style="margin-bottom: 20px;"><h3 style="font-weight: bold; margin-bottom: 5px;">STUDENT DETAILS</h3>
        <table style="width: 100%; border-collapse: collapse; font-size: 12px; background: #fff; border: 2px solid #000;">
          <thead><tr><th style="${thStyle}">CAND NO</th><th style="${thStyle}">PREM NO</th><th style="${thStyle}">NAME</th><th style="${thStyle}">SEX</th><th style="${thStyle}">SUBJECTS</th></tr></thead>
          <tbody>${tbodyHtml}</tbody>
        </table>
      </div>
      <div><h3 style="font-weight: bold; margin-bottom: 5px;">SUBJECT PERFORMANCE</h3>
        <table style="width: 100%; border-collapse: collapse; font-size: 12px; background: #fff; border: 2px solid #000;">
          <thead><tr><th style="${thStyle}">NO</th><th style="${thStyle}">SUBJECT</th><th style="${thStyle}">REGISTERED</th><th style="${thStyle}">SAT</th><th style="${thStyle}">PASSED</th><th style="${thStyle}">AVERAGE</th><th style="${thStyle}">GPA</th></tr></thead>
          <tbody>${subtbodyHtml}</tbody>
        </table>
      </div>`;
  } catch (err) { console.error("Error drawing NECTA report:", err); dash.innerHTML = `<p class="text-red-500 text-center py-6">Error loading tables: ${err.message}</p>`; }
}

async function saveResult(studentId, subjectId, marksStr, gradeCellId) {
  let marks = parseInt(marksStr);
  if (isNaN(marks)) marks = 0;
  if (marks < 0) marks = 0;
  if (marks > 100) marks = 100;
  const grade = getGrade(marks);
  const existing = state.results.find(r => r.student_id == studentId && r.subject_id == subjectId);
  if (existing) {
    const { error } = await supabase.from('results').update({ marks, grade }).eq('id', existing.id);
    if (error) return showToast(error.message, 'error');
    existing.marks = marks; existing.grade = grade;
    showToast('Result updated', 'success');
  } else {
    const { data, error } = await supabase.from('results').insert([{ student_id: studentId, subject_id: subjectId, marks, grade, exam_name: 'Term II Assessment', term: 'Term II', year: '2025', published: false, created_by: state.currentUser.id }]).select().single();
    if (error) return showToast(error.message, 'error');
    state.results.push(data);
    showToast('Result saved', 'success');
  }
  const gradeCell = document.getElementById(gradeCellId);
  if (gradeCell) gradeCell.innerHTML = `<span class="badge badge-blue">${grade}</span>`;
}

function deleteClassSettings(classId) {
  delete state.examConfig.overrides[classId];
  localStorage.setItem('korosho_exam_config', JSON.stringify(state.examConfig));
  showToast('Override removed', 'success');
  renderPage();
}

function saveExamConfig(e) {
  e.preventDefault();
  const form = e.target;
  const key = form.dataset.key;
  const fd = new FormData(form);
  const obj = {};
  for(const [k,v] of fd.entries()) obj[k] = v;
  obj.defaultQuestions = parseInt(obj.defaultQuestions);
  obj.totalMarks = parseInt(obj.totalMarks);
  obj.fontSize = parseInt(obj.fontSize);
  obj.headingFontSize = parseInt(obj.headingFontSize);
  obj.lineSpacing = parseFloat(obj.lineSpacing);
  obj.headingLineSpacing = parseFloat(obj.headingLineSpacing);
  if (key === 'default') state.examConfig.default = { ...state.examConfig.default, ...obj };
  else { if (!state.examConfig.overrides) state.examConfig.overrides = {}; state.examConfig.overrides[key] = obj; }
  localStorage.setItem('korosho_exam_config', JSON.stringify(state.examConfig));
  showToast('Settings saved', 'success');
  closeModal(); renderPage();
}

const A4_WIDTH_MM = 210, A4_HEIGHT_MM = 297, PAGE_PADDING_OUTSIDE_MM = 10, PAGE_PADDING_INSIDE_MM = 10;

function getFontStack(fontType) { return `'${fontType}', 'Century Gothic', 'Jost', 'Trebuchet MS', sans-serif`; }

function getPxPerMm() {
  const div = document.createElement('div');
  div.style.cssText = 'height: 1mm; width: 1mm; position: absolute; left: -9999px; top: -9999px;';
  document.body.appendChild(div);
  const px = div.getBoundingClientRect().height;
  document.body.removeChild(div);
  return px || 3.7795275591;
}

function buildExamBlocks(draft, c, questions) {
  const blocks = [];
  const selectedClass = state.classes.find(cls => cls.id == draft.classId);
  const selectedSubject = state.subjects.find(sub => sub.id == draft.subjectId);
  const className = selectedClass ? selectedClass.name.toUpperCase() : 'N/A';
  const subjectName = selectedSubject ? selectedSubject.name.toUpperCase() : 'N/A';
  const examTitle = (draft.title || c.examTitle).toUpperCase();
  const timeAllowed = c.timeAllowed.toUpperCase();
  const dateStr = new Date().toLocaleDateString('en-GB', { month: 'long', year: 'numeric' }).toUpperCase();
  const customInstr = draft.customInstruction || 'Please write the paper structure instruction in the Exam Details section.';
  const headingStyle = `font-family: ${getFontStack(c.fontType)}; font-size: ${c.headingFontSize}pt; line-height: ${c.headingLineSpacing};`;
  const bodyStyle = `font-family: ${getFontStack(c.fontType)}; font-size: ${c.fontSize}pt; line-height: ${c.lineSpacing};`;

  blocks.push({
    type: 'header',
    html: `<table style="width: 100%; border-collapse: collapse; margin-bottom: 5px; ${headingStyle}">
      <tr>
        <td style="width: 25mm; vertical-align: middle; text-align: left;">
          <img src="${LOGO_URL}" alt="Logo" style="width: 25mm; height: 25mm; object-fit: contain;">
        </td>
        <td style="text-align: center; vertical-align: middle;">
          <div style="font-weight: bold; text-transform: uppercase; white-space: nowrap;">KOROSHO ENGLISH MEDIUM PRE & PRIMARY SCHOOL</div>
          <div style="font-weight: bold; margin-top: 5px; white-space: nowrap;">P.O. Box 03 – TANDAHIMBA – MTWARA</div>
          <div style="font-weight: bold; margin-top: 3px; white-space: nowrap;">TEL: +255715976760/+255623638683/+255655481995</div>
          <div style="font-weight: bold; margin-top: 3px; white-space: nowrap;">EMAIL: <span style="color: #0000EE; text-decoration: underline;">koroshoschool@gmail.com</span></div>
        </td>
        <td style="width: 25mm;">&nbsp;</td>
      </tr>
    </table>`
  });

  blocks.push({
    type: 'exam-title',
    html: `<div style="text-align: center; margin: 5px 0 15px 0; ${headingStyle}">
      <div style="font-weight: bold; text-transform: uppercase;">${examTitle}</div>
      <div style="font-weight: bold; text-transform: uppercase; margin-top: 5px;">${subjectName}</div>
      <div style="font-weight: bold; text-transform: uppercase; margin-top: 5px;">${className}</div>
    </div>`
  });

  blocks.push({
    type: 'time-date',
    html: `<div style="display: flex; justify-content: space-between; font-weight: bold; text-transform: uppercase; margin-top: 20px; ${headingStyle}">
      <span>TIME: ${timeAllowed}</span><span>${dateStr}</span>
    </div>
    <hr style="border: none; border-top: 2px solid #000; margin: 5px 0 15px 0;">`
  });

  blocks.push({
    type: 'pupil-name',
    html: `<div style="font-weight: bold; text-transform: uppercase; margin-bottom: 25px; display: flex; align-items: baseline; ${headingStyle}">
      <span>PUPIL'S NAME&nbsp;</span><span style="border-bottom: 1px solid #000; width: 58%; margin-left: 2mm;"></span>
    </div>`
  });

  blocks.push({
    type: 'instructions',
    html: `<div style="${bodyStyle}">
      <div style="margin-top: 20px;">
        <h3 style="font-weight: bold; margin-bottom: 10px;">Instructions:</h3>
        <ul style="list-style-type: disc; padding-left: 25px; margin: 0;">
          <li style="margin-bottom: 5px;">${customInstr}</li>
          <li style="margin-bottom: 5px;">Answer all questions as per instructions in each section.</li>
          <li style="margin-bottom: 5px;">Observe neatness in your work.</li>
        </ul>
      </div>
    </div>`
  });

  let qCount = 0;
  questions.forEach(q => {
    if (q.type === 'section') {
      blocks.push({
        type: 'section-header',
        html: `<div style="text-align: center; font-size: 1.4em; font-weight: bold; text-transform: uppercase; margin: 20px 0 15px; ${bodyStyle}">${q.text || 'SECTION'}</div>`
      });
    } else {
      qCount++;
      blocks.push({
        type: 'q-header',

      }

      if (q.type === 'mcq') {
        (q.items || []).forEach((item, idx) => {
          let itemHtml = `<div style="margin-bottom: 10px; margin-left: 23px; ${bodyStyle}">

          item.choices.forEach((opt, cIdx) => {
            if (opt) itemHtml += `<div style="margin-bottom: 2px;">${String.fromCharCode(65+cIdx)}) ${opt}</div>`;
          });
          itemHtml += `</div></div>`;
          blocks.push({ type: 'mcq-item', html: itemHtml });
        });
      } else if (q.type === 'matching') {
        const tableWidth = q.tableWidth || 100;
        const colAWidth = q.colAWidth || 50;
        const colBWidth = 100 - colAWidth;
        let tableHtml = `<table style="width: ${tableWidth}%; border-collapse: collapse; margin-top: 10px; margin-left: 23px; margin-bottom: 10px; ${bodyStyle}">
          <thead><tr><th style="border: 1px solid #000; padding: 5px; width: ${colAWidth}%; text-align: left;">Column A</th><th style="border: 1px solid #000; padding: 5px; width: ${colBWidth}%; text-align: left;">Column B</th></tr></thead>
          <tbody>`;
        (q.colA || []).forEach((item, idx) => {
          tableHtml += `<tr><td style="border: 1px solid #000; padding: 5px;">(${toRoman(idx+1)}) ${item}</td><td style="border: 1px solid #000; padding: 5px;">${String.fromCharCode(65+idx)}. ${q.colB[idx] || ''}</td></tr>`;
        });
        tableHtml += `</tbody></table>`;
        blocks.push({ type: 'matching-table', html: tableHtml });
      } else if (q.type === 'picture') {
        (q.rows || []).forEach(row => {
          blocks.push({ type: 'picture-row', html: renderPictureRowHTML(row, bodyStyle) });
        });
      } else if (q.type === 'drawing') {
        const drawItems = q.items || [];
        for (let dIdx = 0; dIdx < drawItems.length; dIdx += 2) {
          const rowItems = drawItems.slice(dIdx, dIdx + 2);
          blocks.push({ type: 'drawing-row', html: renderDrawingRowHTML(rowItems, dIdx, bodyStyle) });
        }
      } else if (q.type === 'mentioning') {
        (q.items || []).forEach((item, idx) => {
          const prefix = getMentionPrefix(q.format, idx);
          blocks.push({
            type: 'mentioning-item',
            html: `<div style="display: flex; align-items: baseline; gap: 5px; margin-bottom: 8px; margin-left: 23px; ${bodyStyle}">
              <span style="font-weight: bold; white-space: nowrap;">${prefix}</span>
              ${item.text ? `<span style="margin-right: 5px;">${item.text}</span>` : ''}
              <span style="border-bottom: 1px solid #000; flex-grow: 1; min-width: 50%;"></span>
            </div>`
          });
        });
      } else if (q.type === 'short') {
        blocks.push({ type: 'answer-line', html: `<div style="margin: 8px 0 8px 23px; border-bottom: 1px solid #000; height: 20px; ${bodyStyle}"></div>` });
      } else if (q.type === 'long') {
        for (let l = 0; l < 4; l++) {
          blocks.push({ type: 'answer-line', html: `<div style="margin: 8px 0 8px 23px; border-bottom: 1px solid #000; height: 20px; ${bodyStyle}"></div>` });
        }
      }
    }
  });
  return blocks;
}

function renderPictureRowHTML(row, bodyStyle) {
  const slotOrder = ['left', 'center-left', 'center', 'center-right', 'right'];
  const enabledSlots = slotOrder.filter(k => row.slots && row.slots[k] && row.slots[k].enabled);
  if (enabledSlots.length === 0) return '';
  let html = `<div style="display: flex; flex-direction: row; justify-content: space-around; align-items: flex-start; gap: 10px; margin-top: 10px; margin-left: 23px; margin-bottom: 10px; ${bodyStyle}">`;
  enabledSlots.forEach(slotKey => {
    const slot = row.slots[slotKey];
    html += `<div style="flex: 1; min-width: 0; text-align: center;">`;
    if (slot.text) html += `<div style="margin-bottom: 5px;">${slot.text}</div>`;
    html += `<div style="display: inline-block;">`;
    if (slot.url) {
      html += `<img src="${slot.url}" style="width: ${slot.width}px; height: ${slot.height}px; object-fit: contain; border: 1px solid #ccc; padding: 4px; display: block;">`;
    } else {
      html += `<div style="width: ${slot.width}px; height: ${slot.height}px; border: 1px dashed #ccc; display: flex; align-items: center; justify-content: center; color: #999; font-size: 11px;">No Image</div>`;
    }
    if (slot.hasLine) {
      html += `<div style="height: 35px;"></div>`;
      html += `<div style="border-bottom: 1px solid #000; width: 100%;"></div>`;
    }
    html += `</div></div>`;
  });
  html += `</div>`;
  return html;
}

function renderDrawingRowHTML(items, startIdx, bodyStyle) {
  let html = `<div style="display: flex; flex-direction: row; gap: 4%; margin-bottom: 15px; margin-left: 23px; ${bodyStyle}">`;
  items.forEach((dItem, j) => {
    const widthPct = dItem.boxWidth || 48;
    html += `<div style="width: ${widthPct}%; min-width: 0;">
      ${dItem.text ? `<div style="font-weight: normal; margin-bottom: 4px;">${dItem.text}</div>` : ''}
      <div style="border: 1px solid #000; height: ${dItem.boxHeight || 100}px; width: 100%; box-sizing: border-box;"></div>
    </div>`;
  });
  html += `</div>`;
  return html;
}

function groupBlocksForPagination(blocks) {
  const groups = [];
  let currentGroup = null;
  for (const block of blocks) {
    if (block.type === 'q-header') {
      if (currentGroup) groups.push(currentGroup);
      currentGroup = { type: 'question', blocks: [block] };
    } else if (block.type === 'section-header') {
      if (currentGroup) groups.push(currentGroup);
      groups.push({ type: 'section', blocks: [block] });
      currentGroup = null;
    } else if (['header', 'exam-title', 'time-date', 'pupil-name', 'instructions'].includes(block.type)) {
      if (currentGroup) groups.push(currentGroup);
      groups.push({ type: 'preamble', blocks: [block] });
      currentGroup = null;
    } else {
      if (currentGroup && currentGroup.type === 'question') {
        currentGroup.blocks.push(block);
      } else {
        if (currentGroup) groups.push(currentGroup);
        currentGroup = { type: 'orphan', blocks: [block] };
        groups.push(currentGroup);
        currentGroup = null;
      }
    }
  }
  if (currentGroup) groups.push(currentGroup);
  return groups;
}

function paginateBlocks(blocks, c) {
  const groups = groupBlocksForPagination(blocks);
  const pxPerMm = getPxPerMm();
  const printableWidthPx = (A4_WIDTH_MM - 2 * PAGE_PADDING_OUTSIDE_MM - 2 * PAGE_PADDING_INSIDE_MM) * pxPerMm;
  const printableHeightPx = (A4_HEIGHT_MM - 2 * PAGE_PADDING_OUTSIDE_MM - 2 * PAGE_PADDING_INSIDE_MM) * pxPerMm;
  
  const page = document.createElement('div');
  page.style.cssText = `position: absolute; left: -99999px; top: 0; width: ${printableWidthPx}px;`;
  const measurer = document.createElement('div');
  measurer.style.cssText = `width: 100%; box-sizing: border-box; font-family: ${getFontStack(c.fontType)}; font-size: ${c.fontSize}pt; line-height: ${c.lineSpacing};`;
  page.appendChild(measurer);
  document.body.appendChild(page);
  
  const maxHeight = printableHeightPx;
  const pages = [];
  let currentPageBlocks = [];

  const measureWith = (extraBlocks) => {
    measurer.innerHTML = [...currentPageBlocks, ...extraBlocks].map(b => b.html).join('');
    return measurer.scrollHeight;
  };

  for (const group of groups) {
    if (measureWith(group.blocks) <= maxHeight) {
      currentPageBlocks.push(...group.blocks);
      continue;
    }
    measurer.innerHTML = group.blocks.map(b => b.html).join('');
    if (measurer.scrollHeight <= maxHeight) {
      if (currentPageBlocks.length > 0) { pages.push(currentPageBlocks); currentPageBlocks = []; }
      currentPageBlocks.push(...group.blocks);
      continue;
    }
    if (currentPageBlocks.length > 0) { pages.push(currentPageBlocks); currentPageBlocks = []; }
    
    if (group.type === 'question') {
      const qHeader = group.blocks[0];
      const subBlocks = group.blocks.slice(1);
      currentPageBlocks = [qHeader];
      
      for (let i = 0; i < subBlocks.length; i++) {
        const block = subBlocks[i];
        if (measureWith([block]) <= maxHeight) {
          currentPageBlocks.push(block);
        } else {
          if (currentPageBlocks.length === 1 && currentPageBlocks[0].type === 'q-header' && i === 0) {
            pages.push([]);
            currentPageBlocks = [qHeader, block];
          } else {
            pages.push(currentPageBlocks);
            currentPageBlocks = [block];
          }
        }
      }
    } else {
      currentPageBlocks.push(...group.blocks);
    }
  }
  if (currentPageBlocks.length > 0) pages.push(currentPageBlocks);
  if (pages.length === 0) pages.push([]);
  
  document.body.removeChild(page);
  return pages;
}

function renderExamPagesHTML(pages, c) {
  const borderCSS = getBorderCSS(c.borderStyle);
  const bodyFontStyle = `font-family: ${getFontStack(c.fontType)}; font-size: ${c.fontSize}pt; line-height: ${c.lineSpacing};`;
  return pages.map(blocks => {
    return `<div class="a4-page">
      <div class="a4-page-content" style="${borderCSS} ${bodyFontStyle}">
        ${blocks.map(b => b.html).join('')}
      </div>
    </div>`;
  }).join('');
}

function updateExamPreview() {
  const previewDiv = document.getElementById('exam-live-preview');
  if (!previewDiv) return;
  const draft = state.examDraft;
  const c = getExamSettings(draft.classId);
  const questions = state.examQuestions;
  const blocks = buildExamBlocks(draft, c, questions);
  const pages = paginateBlocks(blocks, c);
  previewDiv.innerHTML = renderExamPagesHTML(pages, c);
}

function toRoman(num) { const romans = ["i", "ii", "iii", "iv", "v", "vi", "vii", "viii", "ix", "x", "xi", "xii"]; return romans[num - 1] || num; }
function getMentionPrefix(format, index) {
  const romans = ["i", "ii", "iii", "iv", "v", "vi", "vii", "viii", "ix", "x", "xi", "xii"];
  const letters = ["a", "b", "c", "d", "e", "f", "g", "h", "i", "j", "k", "l"];
  switch(format) {
    case 'roman': return `${romans[index]}.`;
    case 'bracket-roman': return `(${romans[index]})`;
    case 'letter': return `${letters[index]}.`;
    case 'bracket-letter': return `(${letters[index]})`;
    default: return `${index+1}.`;
  }
}

  (q.rows || []).forEach((row, rowIdx) => {
    html += `<div class="border rounded-lg p-3" style="background:#fff;">

        <span class="text-xs font-bold text-slate-600">Row ${rowIdx + 1}</span>

  const c = getExamSettings(draft.classId);
  const questions = exam ? exam.questions : state.examQuestions;
  const blocks = buildExamBlocks(draft, c, questions);
  const pages = paginateBlocks(blocks, c);
  const pagesHtml = renderExamPagesHTML(pages, c);
  const borderCSS = getBorderCSS(c.borderStyle);
  const bodyFontStyle = `font-family: ${getFontStack(c.fontType)}; font-size: ${c.fontSize}pt; line-height: ${c.lineSpacing};`;

  const fullHTML = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Print Exam - ${draft.title || 'Untitled'}</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,400;0,600;0,700&display=swap" rel="stylesheet">
<style>
  @page { size: A4 portrait; margin: 0; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #e2e8f0; font-family: ${getFontStack(c.fontType)}; }

  .print-btn { padding: 14px 32px; background: #047857; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; font-family: ${getFontStack(c.fontType)}; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  .print-btn:hover { background: #065F46; }
  .a4-page {
    width: 210mm; height: 297mm; background: white; box-sizing: border-box; overflow: hidden; position: relative; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; padding: 10mm;
  }
  .a4-page-content { width: 100%; height: 100%; box-sizing: border-box; padding: 10mm; overflow: hidden; position: relative; ${borderCSS} ${bodyFontStyle} }
  @media print {
    html, body { margin: 0; padding: 0; background: white; gap: 0; }

</head>
<body>
  <div class="print-btn-container"><button class="print-btn" onclick="window.print()">Print / Save as PDF</button></div>

</body>
</html>`;

  document.body.appendChild(a); a.click(); document.body.removeChild(a);

    if (!state.examDraft.isDirty) { showToast('No changes made. Print opened, but no new copy sent to Admin.', 'info'); return; }

function formatClassName(name) {
  if (!name) return '';
  const upper = name.toUpperCase();
  if (upper.includes('PRE-UNIT') || upper.includes('PRE UNIT') || upper.includes('AWALI')) return '(AWALI)';
  let match = upper.match(/STANDARD\s*([1-6])/) || upper.match(/STD\s*([1-6])/);
  if (match) {
    const romans = ["I", "II", "III", "IV", "V", "VI"];
    return romans[parseInt(match[1]) - 1];
  }
  return name;
}

function getStudentPosition(student) {
  if (!student.class_id) return { pos: 1, total: 1 };
  const classStudents = state.students.filter(s => s.class_id == student.class_id);
  let ranks = classStudents.map(cs => {
    let total = 0, count = 0;
    state.subjects.forEach(sub => {
      const r = state.results.find(x => x.student_id == cs.id && x.subject_id == sub.id);
      if (r) { total += Number(r.marks); count++; }
    });
    return { id: cs.id, avg: count > 0 ? total/count : 0 };
  });
  ranks.sort((a,b) => b.avg - a.avg);
  const pos = ranks.findIndex(r => r.id == student.id) + 1;
  return { pos: pos > 0 ? pos : 1, total: ranks.length };
}

function getReportComment(grade) {
  switch(grade) {
    case 'A': return 'VIZURI SANA';
    case 'B': return 'VIZURI';

    case 'D': return 'DHAIFU';
    case 'E': return 'DHAIFU SANA';

}

function saveReportData(e, studentId) {
  e.preventDefault();
  const role = state.currentUser.role;
  if (!state.reportData[studentId]) state.reportData[studentId] = {};
  const data = state.reportData[studentId];

  if (role === 'teacher' || role === 'admin') {
    data.behavior1 = document.getElementById('rd-b1').value;
    data.behavior2 = document.getElementById('rd-b2').value;
    data.behavior3 = document.getElementById('rd-b3').value;
    data.teacher_comment = document.getElementById('rd-tc').value;
  }
  if (role === 'academic' || role === 'admin') {
    data.academic_comment = document.getElementById('rd-ac').value;
  }
  if (role === 'headteacher' || role === 'admin') {
    data.head_comment = document.getElementById('rd-hc').value;
  }

  saveReportDataLocally();
  closeModal();
  renderPage();
  showToast('Report data saved successfully', 'success');
}

function renderBulkImport() {
  return `<div class="card fade-up-1 max-w-2xl mx-auto">

    <div class="bg-slate-50 p-4 rounded-lg border border-slate-200 mb-6">
      <h4 class="font-bold text-sm mb-2">CSV File Format Rules:</h4>
      <p class="text-xs text-slate-500 mb-2">The first row must be the headers. The columns must be in this exact order:</p>
      <code class="text-xs bg-white p-2 block rounded border border-slate-200 text-emerald-700">name, class_name, gender, age, parent_name, parent_phone</code>
      <p class="text-xs text-slate-500 mt-2">* <b>class_name</b> must match exactly a class already in the system (e.g., Standard III).</p>
      <p class="text-xs text-slate-500">* <b>gender</b> must be 'M' or 'F'.</p>
    </div>

    <div class="space-y-4">
      <div>
        <label class="form-label">Upload CSV File</label>
        <input type="file" id="csv-file" accept=".csv" class="form-input" style="padding: 10px;">
      </div>
      <button class="btn-primary w-full" onclick="processCSV()"><i class="fa-solid fa-upload mr-1"></i> Process & Import Students</button>
    </div>
  </div>`;
}

async function processCSV() {
  const fileInput = document.getElementById('csv-file');
  if (!fileInput.files.length) return showToast('Please select a CSV file', 'error');
  
  const file = fileInput.files[0];
  const reader = new FileReader();
  
  reader.onload = async (e) => {
    const text = e.target.result;
    const rows = text.split('\n').filter(r => r.trim() !== '');
    
    if (rows.length < 2) return showToast('CSV file is empty or missing data', 'error');
    
    // Skip header row (row[0])
    const studentsToInsert = [];
    let skipped = 0;
    
    for (let i = 1; i < rows.length; i++) {
      const cols = rows[i].split(',').map(c => c.trim().replace(/^"|"$/g, '')); // remove quotes if exists
      if (cols.length < 6) { skipped++; continue; }
      
      const [name, className, gender, age, parentName, parentPhone] = cols;
      
      // Find class ID
      const cls = state.classes.find(c => c.name.toLowerCase() === className.toLowerCase());
      if (!cls) {
        showToast(`Row ${i+1}: Class "${className}" not found. Skipping.`, 'warn');
        skipped++;
        continue;
      }
      
      studentsToInsert.push({
        name, class_id: cls.id, gender: gender.toUpperCase().startsWith('F') ? 'F' : 'M',
        age: Number(age) || 10, parent_name: parentName, parent_phone: parentPhone
      });
    }
    
    if (studentsToInsert.length === 0) return showToast('No valid students to import. Check CSV format.', 'error');
    
    showToast(`Importing ${studentsToInsert.length} students...`, 'info');
    const { error } = await supabase.from('students').insert(studentsToInsert);
    
    if (error) return showToast('Import failed: ' + error.message, 'error');
    
    showToast(`Success! ${studentsToInsert.length} students imported. ${skipped} rows skipped.`, 'success');
    await fetchAllData();
    navigateTo('students');
  };
  
  reader.readAsText(file);
}

async function saveAssignment(subjectId, teacherId) {
  const classId = assignmentDraft.classId;
  if (!classId) return;

  const existing = state.classSubjects.find(a => a.class_id == classId && a.subject_id == subjectId);
  
  if (existing) {
    if (!teacherId) {
      // If unassigned, delete the record
      const { error } = await supabase.from('class_subjects').delete().eq('id', existing.id);
      if (error) return showToast('Error unassigning: ' + error.message, 'error');
      state.classSubjects = state.classSubjects.filter(a => a.id !== existing.id);
      showToast('Teacher unassigned', 'info');
    } else {
      // Update existing record
      const { data, error } = await supabase.from('class_subjects').update({ teacher_id: teacherId }).eq('id', existing.id).select().single();
      if (error) return showToast('Error updating: ' + error.message, 'error');
      existing.teacher_id = teacherId;
      showToast('Assignment updated', 'success');
    }
  } else {
    if (!teacherId) return; // Don't create empty records
    // Insert new record
    const { data, error } = await supabase.from('class_subjects').insert([{ 
      class_id: classId, subject_id: subjectId, teacher_id: teacherId 
    }]).select().single();
    if (error) return showToast('Error assigning: ' + error.message, 'error');
    state.classSubjects.push(data);
    showToast('Teacher assigned successfully', 'success');
  }
}
