<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Korosho English Medium School — Management Portal</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --primary: #047857; --primary-light: #10B981; --primary-dark: #065F46;
  --accent: #D97706; --accent-light: #F59E0B;
  --sidebar-bg: #0F172A; --sidebar-hover: #1E293B;
  --app-bg: #F1F5F9; --card: #FFFFFF; --text: #0F172A;
  --muted: #64748B; --border: #E2E8F0;
  --danger: #DC2626; --success: #16A34A; --warning: #F59E0B;
  --info: #0EA5E9; --purple: #9333EA;
}
* { font-family: 'Outfit', sans-serif; box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body { background: var(--app-bg); color: var(--text); }

.login-bg { background: linear-gradient(135deg, #0F172A 0%, #065F46 50%, #0F172A 100%); min-height: 100vh; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; padding: 20px; }
.blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.45; pointer-events: none; animation: float 14s ease-in-out infinite; }
.blob-1 { width: 520px; height: 520px; background: radial-gradient(circle, #10B981, transparent 70%); top: -160px; left: -120px; }
.blob-2 { width: 480px; height: 480px; background: radial-gradient(circle, #F59E0B, transparent 70%); bottom: -160px; right: -120px; animation-delay: -7s; }
@keyframes float { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(60px,-50px) scale(1.1); } 66% { transform: translate(-40px,40px) scale(0.95); } }
.glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
.glass-input { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; padding: 13px 16px 13px 44px; border-radius: 12px; width: 100%; font-size: 14px; transition: all 0.2s; }
.glass-input::placeholder { color: rgba(255,255,255,0.5); }
.glass-input:focus { outline: none; border-color: rgba(16,185,129,0.7); background: rgba(255,255,255,0.05); }
.input-wrap { position: relative; }
.input-wrap i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.4); }
.btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; padding: 13px 24px; border-radius: 12px; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s; font-size: 14px; }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 28px -6px rgba(4,120,87,0.5); }
.btn-ghost { background: white; color: var(--text); padding: 10px 18px; border-radius: 10px; font-weight: 500; border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; font-size: 14px; }
.btn-ghost:hover { background: #F8FAFC; border-color: #CBD5E1; }

.sidebar { width: 260px; background: var(--sidebar-bg); color: rgba(255,255,255,0.6); position: fixed; left: 0; top: 0; bottom: 0; z-index: 50; display: flex; flex-direction: column; transition: transform 0.3s; }
.sidebar-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 12px; }
.logo-icon { width: 42px; height: 42px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 18px; flex-shrink: 0; }
.nav-scroll { flex: 1; overflow-y: auto; padding: 12px; }
.nav-section { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.3); padding: 12px 16px 6px; font-weight: 600; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 10px; color: rgba(255,255,255,0.6); cursor: pointer; transition: all 0.2s; font-size: 14px; font-weight: 500; margin-bottom: 2px; border: 1px solid transparent; }
.nav-item:hover { background: var(--sidebar-hover); color: rgba(255,255,255,0.9); }
.nav-item.active { background: linear-gradient(135deg, rgba(16,185,129,0.18), rgba(4,120,87,0.08)); color: var(--primary-light); border: 1px solid rgba(16,185,129,0.3); }
.nav-item i { width: 20px; text-align: center; font-size: 15px; }
.sidebar-footer { padding: 12px; border-top: 1px solid rgba(255,255,255,0.05); }
.user-chip { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 10px; margin-bottom: 8px; }
.avatar { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-light)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 14px; flex-shrink: 0; }
.signout-btn { width: 100%; padding: 11px; background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.signout-btn:hover { background: var(--danger); color: white; border-color: var(--danger); }

.main-content { margin-left: 260px; min-height: 100vh; }
.header-bar { position: sticky; top: 0; background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 16px 32px; z-index: 40; display: flex; align-items: center; justify-content: space-between; }
.page-content { padding: 28px 32px; }

.stat-card { background: white; border-radius: 14px; padding: 22px; border: 1px solid var(--border); position: relative; overflow: hidden; transition: all 0.2s; }
.stat-card:hover { transform: translateY(-2px); box-shadow: 0 12px 30px -8px rgba(0,0,0,0.08); }
.stat-card::before { content: ''; position: absolute; top: -30px; right: -30px; width: 110px; height: 110px; border-radius: 50%; background: linear-gradient(135deg, var(--primary-light), transparent); opacity: 0.12; }
.card { background: white; border-radius: 14px; border: 1px solid var(--border); padding: 22px; }
.section-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }

.badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.badge-green { background: #DCFCE7; color: #166534; } .badge-amber { background: #FEF3C7; color: #92400E; }
.badge-red { background: #FEE2E2; color: #991B1B; } .badge-blue { background: #DBEAFE; color: #1E40AF; }
.badge-gray { background: #F1F5F9; color: #475569; } .badge-purple { background: #F3E8FF; color: #6B21A8; }

.data-table { width: 100%; border-collapse: collapse; }
.data-table thead th { background: #F8FAFC; color: var(--muted); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
.data-table tbody td { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 14px; }
.data-table tbody tr { transition: background 0.15s; }
.data-table tbody tr:hover { background: #F8FAFC; }
.data-table tbody tr:last-child td { border-bottom: none; }

.modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.65); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.active { opacity: 1; pointer-events: auto; }
.modal-box { background: white; border-radius: 16px; max-width: 540px; width: 100%; max-height: 90vh; overflow-y: auto; transform: translateY(20px); transition: transform 0.3s; }
.modal-overlay.active .modal-box { transform: translateY(0); }
.modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-body { padding: 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
.form-input { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; font-family: 'Outfit', sans-serif; background: white; color: var(--text); transition: all 0.15s; }
.form-input:focus { outline: none; border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(16,185,129,0.12); }
select.form-input { cursor: pointer; }

.toast-container { position: fixed; top: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 10px; }
.toast { background: white; border-left: 4px solid var(--success); padding: 14px 18px; border-radius: 10px; box-shadow: 0 12px 30px -6px rgba(0,0,0,0.18); display: flex; align-items: center; gap: 12px; min-width: 300px; animation: slideIn 0.3s ease-out; }
.toast.error { border-left-color: var(--danger); } .toast.info { border-left-color: var(--info); } .toast.warn { border-left-color: var(--warning); }
@keyframes slideIn { from { transform: translateX(420px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

.timetable-wrapper { overflow-x: auto; }
.timetable-grid { display: grid; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; min-width: 800px; }
.tt-cell { background: white; padding: 10px; min-height: 72px; font-size: 13px; }
.tt-header { background: #F8FAFC; font-weight: 700; color: var(--muted); text-align: center; padding: 12px 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
.tt-time { background: #F8FAFC; font-weight: 600; color: var(--muted); font-size: 11px; text-align: center; display: flex; align-items: center; justify-content: center; padding: 8px; }
.tt-class { background: #ECFDF5; border: 1px solid #A7F3D0; border-radius: 6px; padding: 8px; font-size: 12px; height: 100%; cursor: pointer; transition: all 0.15s; }
.tt-class:hover { background: #D1FAE5; transform: scale(1.02); }
.tt-class .subj { font-weight: 700; color: var(--primary-dark); }
.tt-class .tea { color: var(--muted); font-size: 10px; margin-top: 2px; }
.tt-break { background: #FEF3C7; border: 1px solid #FDE68A; border-radius: 6px; padding: 8px; font-size: 12px; color: #92400E; text-align: center; font-weight: 700; display: flex; align-items: center; justify-content: center; height: 100%; }

.notice-card { background: white; border-radius: 12px; border-left: 4px solid var(--primary); border-top: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 16px 18px; transition: all 0.2s; }
.notice-card:hover { transform: translateX(2px); box-shadow: 0 8px 20px -8px rgba(0,0,0,0.08); }
.notice-card.high { border-left-color: var(--danger); }

@keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
.fade-up-1 { animation: fadeUp 0.5s ease-out 0.05s both; } .fade-up-2 { animation: fadeUp 0.5s ease-out 0.1s both; }
.fade-up-3 { animation: fadeUp 0.5s ease-out 0.15s both; } .fade-up-4 { animation: fadeUp 0.5s ease-out 0.2s both; }
.fade-up-5 { animation: fadeUp 0.5s ease-out 0.25s both; } .fade-up-6 { animation: fadeUp 0.5s ease-out 0.3s both; }

::-webkit-scrollbar { width: 8px; height: 8px; } ::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 4px; } ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
.hidden-page { display: none !important; }

@media (max-width: 1024px) { .sidebar { transform: translateX(-100%); } .sidebar.open { transform: translateX(0); } .main-content { margin-left: 0; } }
@media (max-width: 640px) { .header-bar { padding: 14px 18px; } .page-content { padding: 18px; } }
.menu-btn { background: white; border: 1px solid var(--border); width: 40px; height: 40px; border-radius: 10px; display: none; align-items: center; justify-content: center; cursor: pointer; }
@media (max-width: 1024px) { .menu-btn { display: flex; } }
.icon-btn { width: 40px; height: 40px; background: #F8FAFC; border: 1px solid var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; transition: all 0.15s; color: var(--muted); }
.icon-btn:hover { background: white; color: var(--text); }
.icon-btn .dot { position: absolute; top: 8px; right: 9px; width: 8px; height: 8px; background: var(--danger); border-radius: 50%; border: 2px solid white; }

.q-type-card { border: 2px dashed var(--border); border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.2s; text-align: center; }
.q-type-card:hover { border-color: var(--primary-light); background: #ECFDF5; }
.q-type-card.selected { border-color: var(--primary); border-style: solid; background: #ECFDF5; }
.question-block { background: #F8FAFC; border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.progress-track { background: #E2E8F0; border-radius: 10px; height: 8px; overflow: hidden; }
.progress-fill { background: linear-gradient(90deg, var(--primary), var(--primary-light)); height: 100%; border-radius: 10px; transition: width 0.4s; }

/* ===== 100% FOOLPROOF PRINT CSS ===== */
@media print {
  html, body {
    margin: 0 !important;
    padding: 0 !important;
    background: #fff !important;
  }
  /* Physically remove the app from the page during printing */
  body > *:not(#print-area) {
    display: none !important;
  }
  #print-area {
    display: block !important;
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    z-index: 9999;
  }
}
</style>
</head>
<body>

<div id="loginPage" class="login-bg">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="glass-card w-full max-w-md p-8 sm:p-10 relative z-10 fade-up-1">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4" style="background: linear-gradient(135deg, var(--primary), var(--primary-light));">
        <i class="fa-solid fa-graduation-cap text-white text-2xl"></i>
      </div>
      <h1 class="text-white text-2xl font-bold tracking-tight">Korosho English Medium School</h1>
      <p class="text-white/50 text-sm mt-1">School Management System Portal</p>
    </div>
    <form id="loginForm" class="space-y-4">
      <div>
        <label class="text-white/70 text-xs font-semibold uppercase tracking-wider mb-2 block">Email</label>
        <div class="input-wrap"><i class="fa-solid fa-envelope"></i><input type="email" id="loginUsername" class="glass-input" placeholder="Enter your email" required></div>
      </div>
      <div>
        <label class="text-white/70 text-xs font-semibold uppercase tracking-wider mb-2 block">Password</label>
        <div class="input-wrap"><i class="fa-solid fa-lock"></i><input type="password" id="loginPassword" class="glass-input" placeholder="Enter your password" required></div>
      </div>
      <div id="loginErrorBox" class="hidden bg-red-500/20 border border-red-500/40 text-red-200 text-sm rounded-xl px-4 py-3 text-center"></div>
      <button type="submit" class="btn-primary w-full mt-4 flex items-center justify-center gap-2"><i class="fa-solid fa-right-to-bracket"></i> Sign In to Portal</button>
    </form>
  </div>
</div>

<div id="appShell" class="hidden-page">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-icon">K</div>
      <div><div class="text-white font-bold text-sm leading-tight">Korosho EMS</div><div class="text-white/40 text-[11px]">Management Portal</div></div>
    </div>
    <div class="nav-scroll" id="navMenu"></div>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="avatar" id="sideAvatar">S</div>
        <div class="flex-1 min-w-0"><div class="text-white text-sm font-semibold truncate" id="sideName">User</div><div class="text-white/40 text-[11px] capitalize" id="sideRole">role</div></div>
      </div>
      <button class="signout-btn" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</button>
    </div>
  </aside>
  <div class="main-content">
    <header class="header-bar">
      <div class="flex items-center gap-3">
        <button class="menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
        <div><h2 class="text-lg font-bold text-slate-900" id="pageTitle">Dashboard</h2><p class="text-xs text-slate-500" id="pageBreadcrumb">Home / Dashboard</p></div>
      </div>
      <div class="flex items-center gap-3">
        <button class="icon-btn" onclick="navigateTo('notices')"><i class="fa-solid fa-bell"></i><span class="dot"></span></button>
        <div class="hidden sm:flex items-center gap-2 pl-3 ml-1 border-l border-slate-200">
          <div class="avatar" id="headerAvatar" style="width:36px;height:36px;font-size:13px;">S</div>
          <div class="hidden md:block"><div class="text-sm font-semibold text-slate-900" id="headerName">User</div><div class="text-[11px] text-slate-500 capitalize" id="headerRole">role</div></div>
        </div>
      </div>
    </header>
    <main class="page-content" id="pageContent"></main>
  </div>
</div>

<div id="modalHost"></div>
<div class="toast-container" id="toastHost"></div>
<div id="print-area" style="display: none;"></div>

<script>
const SUPABASE_URL = 'https://svlcwdxwnrrwoesjnklj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2bGN3ZHh3bnJyd29lc2pua2xqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5NTY1NjUsImV4cCI6MjA5ODUzMjU2NX0.5AawITGCbHFuZFGMOsLocgPL3IZoZRtKpcNOtRhcLtY';
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const LOGO_URL = 'https://svlcwdxwnrrwoesjnklj.supabase.co/storage/v1/object/sign/school-logo/school.png?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV81NmQ0YjljMi00NWMwLTQ3YTUtOGZmZS0xMGEyZTczOGM4NjgiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJzY2hvb2wtbG9nby9zY2hvb2wucG5nIiwic2NvcGUiOiJkb3dubG9hZCIsImlhdCI6MTc4MzEwMTgxOSwiZXhwIjo0OTM2NzAxODE5fQ.hTGvs249_1szP--Fb0FJzVy3XSneO1tHhW26mV7MWpg';

const state = {
  currentUser: null, currentPage: 'dashboard',
  teachers: [], students: [], classes: [], subjects: [], notices: [], exams: [], results: [],
  examConfig: {
    default: { defaultQuestions: 5, fontType: 'Times New Roman', fontSize: 12, alignment: 'left', lineSpacing: 1.15, totalMarks: 50, examTitle: 'MID-TERM EXAMINATION', timeAllowed: '1:30 HOURS', instructions: 'Answer ALL questions.' },
    overrides: {}
  },
  examQuestions: [], timetable: null,
  examDraft: { classId: null, subjectId: null, title: '', customInstruction: '', isDirty: true },
  resultsDraft: { subjectId: null, classId: null }
};

const savedConfig = localStorage.getItem('korosho_exam_config');
if (savedConfig) {
  try {
    const parsed = JSON.parse(savedConfig);
    state.examConfig.default = parsed.default || state.examConfig.default;
    state.examConfig.overrides = parsed.overrides || {};
  } catch(e) {}
}

function getExamSettings(classId) {
  if (classId && state.examConfig.overrides[classId]) return state.examConfig.overrides[classId];
  return state.examConfig.default;
}
  
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const submitBtn = e.target.querySelector('button[type="submit"]');
  const errorBox = document.getElementById('loginErrorBox');

  if (errorBox) { errorBox.classList.add('hidden'); errorBox.innerText = ''; }
  submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing In...';
  submitBtn.disabled = true;

  try {
    const { data: authData, error: authError } = await supabase.auth.signInWithPassword({ email, password });
    if (authError) throw new Error(authError.message);

    let { data: profile, error: profileError } = await supabase.from('profiles').select('*').eq('id', authData.user.id).single();
    if (profileError && profileError.code === 'PGRST116') {
      const { data: newProfile, error: insertError } = await supabase.from('profiles').insert([{ id: authData.user.id, full_name: email.split('@')[0], role: 'admin', email: email }]).select().single();
      if (insertError) throw new Error('Could not create user profile: ' + insertError.message);
      profile = newProfile;
    } else if (profileError) {
      throw new Error('Database Error: ' + profileError.message);
    }

    state.currentUser = { id: authData.user.id, username: email, name: profile.full_name || email.split('@')[0], role: profile.role || 'admin' };
    document.getElementById('loginPage').classList.add('hidden-page');
    document.getElementById('appShell').classList.remove('hidden-page');
    await initApp();
    showToast(`Welcome back, ${state.currentUser.name.split(' ')[0]}!`, 'success');
  } catch (err) {
    document.getElementById('loginPage').classList.remove('hidden-page');
    document.getElementById('appShell').classList.add('hidden-page');
    if (errorBox) { errorBox.innerText = "Login Failed: " + err.message; errorBox.classList.remove('hidden'); }
    submitBtn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Sign In to Portal';
    submitBtn.disabled = false;
    await supabase.auth.signOut();
  }
});

async function checkSession() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    try {
      const { data: profile } = await supabase.from('profiles').select('*').eq('id', session.user.id).single();
      if (profile) {
        state.currentUser = { id: session.user.id, username: session.user.email, name: profile.full_name, role: profile.role };
        document.getElementById('loginPage').classList.add('hidden-page');
        document.getElementById('appShell').classList.remove('hidden-page');
        await initApp();
      }
    } catch (e) { console.error("Session check error", e); }
  }
}

async function fetchAllData() {
  let profilesMap = {};
  try {
    const { data: profiles, error: pErr } = await supabase.from('profiles').select('*');
    if (pErr) throw pErr;
    state.teachers = profiles.filter(p => ['teacher', 'academic', 'headteacher', 'admin'].includes(p.role)) || [];
    profiles.forEach(p => { profilesMap[p.id] = p; });
  } catch (e) { console.warn("Profiles fetch failed:", e.message); state.teachers = []; }

  try {
    const { data: classes, error: cErr } = await supabase.from('classes').select('*');
    if (cErr) throw cErr;
    state.classes = (classes || []).map(c => ({
      ...c,
      profiles: c.class_teacher_id ? profilesMap[c.class_teacher_id] : null
    }));
  } catch (e) { console.warn("Classes fetch failed:", e.message); state.classes = []; }

  try {
    const { data: subjects, error: sErr } = await supabase.from('subjects').select('*');
    if (sErr) throw sErr;
    state.subjects = (subjects || []).map(s => ({
      ...s,
      profiles: s.teacher_id ? profilesMap[s.teacher_id] : null
    }));
  } catch (e) { console.warn("Subjects fetch failed:", e.message); state.subjects = []; }

  try {
    const { data: students, error: stErr } = await supabase.from('students').select('*');
    if (stErr) throw stErr;
    const classesMap = {};
    state.classes.forEach(c => classesMap[c.id] = c);
    state.students = (students || []).map(st => ({
      ...st,
      classes: st.class_id ? classesMap[st.class_id] : null
    }));
  } catch (e) { console.warn("Students fetch failed:", e.message); state.students = []; }

  try {
    const { data: notices, error: nErr } = await supabase.from('notices').select('*').order('created_at', { ascending: false });
    if (nErr) throw nErr;
    state.notices = (notices || []).map(n => ({
      ...n,
      profiles: n.author_id ? profilesMap[n.author_id] : null
    }));
  } catch (e) { console.warn("Notices fetch failed:", e.message); state.notices = []; }

  try {
    const { data: exams, error: eErr } = await supabase.from('exams').select('*, classes(name), subjects(name), profiles(full_name)').order('created_at', { ascending: false });
    if (eErr) throw eErr;
    state.exams = exams || [];
  } catch (e) { console.warn("Exams fetch failed:", e.message); state.exams = []; }

  try {
    const { data: results, error: rErr } = await supabase.from('results').select('*');
    if (rErr) throw rErr;
    state.results = results || [];
  } catch (e) { console.warn("Results fetch failed:", e.message); state.results = []; }

  if (!state.timetable) generateTimetable();
}

async function initApp() {

  navigateTo('dashboard');
  
  supabase.channel('public:published_reports')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'published_reports' }, async payload => {
      if (state.currentPage === 'results') {

        await loadNectaReport();
      }

  supabase.channel('public:results')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'results' }, async payload => {

function buildNav() {
  const menu = NAV_MENUS[state.currentUser.role] || NAV_MENUS['admin'];
  const host = document.getElementById('navMenu');
  host.innerHTML = menu.map(item => {
    if (item.section) return `<div class="nav-section">${item.section}</div>`;
    return `<div class="nav-item" data-page="${item.id}" onclick="navigateTo('${item.id}')"><i class="fa-solid ${item.icon}"></i><span>${item.label}</span></div>`;
  }).join('');
}

function navigateTo(page) {
  state.currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
  const menu = NAV_MENUS[state.currentUser.role] || NAV_MENUS['admin'];
  const item = menu.find(m => m.id === page);
  document.getElementById('pageTitle').textContent = item ? item.label : 'Dashboard';
  document.getElementById('pageBreadcrumb').textContent = `Home / ${item ? item.label : 'Dashboard'}`;
  renderPage();
  if (window.innerWidth <= 1024) document.getElementById('sidebar').classList.remove('open');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderTeacherTodaySchedule(user) {
  const today = new Date().toLocaleDateString('en-US', { weekday: 'long' });
  if (!['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'].includes(today)) return '<p class="text-sm text-slate-500">No school today.</p>';
  
  const sessions = [];
  if (state.timetable) {
    state.timetable.timeSlots.forEach((slot, sIdx) => {
      if (slot.type === 'break') return;
      const cell = state.timetable.cells[`${today}-${sIdx}`];
      if (cell && cell.type === 'lesson' && cell.teaId === user.id) {
        sessions.push({ ...cell, time: slot.time, sIdx });
      }
    });
  }

  if (sessions.length === 0) return '<p class="text-sm text-slate-500">You have no teaching sessions today.</p>';

  const now = new Date();
  const currentMins = now.getHours() * 60 + now.getMinutes();

  return `
    <div class="space-y-2">
      ${sessions.map(s => {
        const [start, end] = s.time.split(' - ');
        const [sh, sm] = start.split(':').map(Number);
        const [eh, em] = end.split(':').map(Number);
        const startMins = sh * 60 + sm;
        const endMins = eh * 60 + em;

        let status = { label: 'Upcoming', color: 'gray', icon: 'fa-clock' };
        if (currentMins > endMins) {
          status = { label: 'Completed', color: 'green', icon: 'fa-check-circle' };
        } else if (currentMins >= startMins && currentMins <= endMins) {
          status = { label: 'In Progress', color: 'amber', icon: 'fa-spinner fa-spin' };
        }

        return `
          <div class="flex items-center gap-3 p-3 rounded-lg border ${status.color === 'amber' ? 'bg-amber-50' : status.color === 'green' ? 'bg-green-50' : 'bg-slate-50'}" style="border-color:var(--border)">
            <div class="text-xs font-mono font-bold w-20 text-slate-600">${s.time}</div>
            <div class="flex-1">
              <div class="font-semibold text-sm">${s.subj}</div>
              <div class="text-xs text-slate-500">Period ${s.sIdx + 1}</div>
            </div>
            <div class="badge badge-${status.color}">
              <i class="fa-solid ${status.icon} mr-1"></i> ${status.label}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function generateTimetable() {
  const days = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
  const timeSlots = [
    { time: '08:00 - 08:40', type: 'lesson' }, { time: '08:40 - 09:20', type: 'lesson' },
    { time: '09:20 - 10:00', type: 'lesson' }, { time: '10:00 - 10:40', type: 'lesson' },
    { time: '10:40 - 11:00', type: 'break', label: 'Short Break' },
    { time: '11:00 - 11:40', type: 'lesson' }, { time: '11:40 - 12:20', type: 'lesson' },
    { time: '12:20 - 13:00', type: 'lesson' },
    { time: '13:00 - 14:00', type: 'break', label: 'Lunch Break' },
    { time: '14:00 - 14:40', type: 'lesson' }, { time: '14:40 - 15:20', type: 'lesson' }
  ];
  
  const subjectPool = state.subjects.length > 0 ? state.subjects : [{id: 'free', name: 'Free', code: 'FREE', teacher_id: null, profiles: {full_name: '-'}}];
  const teachers = state.teachers || [];

  const lessonSlots = timeSlots.filter(s => s.type === 'lesson').length;
  const totalPeriods = lessonSlots * days.length;
  const pool = [];
  const baseCount = Math.floor(totalPeriods / subjectPool.length);
  const remainder = totalPeriods % subjectPool.length;

  subjectPool.forEach((subj, idx) => {
    let count = baseCount + (idx < remainder ? 1 : 0);
    for(let i=0; i<count; i++) pool.push(subj);
  });

  for(let i=pool.length-1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]] = [pool[j],pool[i]];
  }

  const timetable = { days, timeSlots, cells: {} };
  let poolIdx = 0;

  days.forEach(day => {
    let prevSubjectId = null;
    timeSlots.forEach((slot, sIdx) => {
      const key = `${day}-${sIdx}`;
      if (slot.type === 'break') {
        timetable.cells[key] = { type: 'break', label: slot.label };
      } else {
        let attempts = 0;
        let chosenSubj = pool[poolIdx % pool.length];
        while (chosenSubj.id === prevSubjectId && attempts < 10 && pool.length > 1) {
          poolIdx++;
          chosenSubj = pool[poolIdx % pool.length];
          attempts++;
        }
        
        const teacher = teachers.find(t => t.id === chosenSubj.teacher_id);
        timetable.cells[key] = { 
          type: 'lesson', 
          subj: chosenSubj.name, 
          subjId: chosenSubj.id,
          tea: teacher ? teacher.full_name : '—',
          teaId: teacher ? teacher.id : null
        };
        prevSubjectId = chosenSubj.id;
        poolIdx++;
      }
    });
  });
  state.timetable = timetable;
}

function renderTimetable() {
  const tt = state.timetable, isAdmin = ['admin','academic'].includes(state.currentUser.role);

          <button class="btn-ghost" onclick="regenerateTimetable()"><i class="fa-solid fa-rotate mr-1"></i> Regenerate</button>

function editTimetableCell(day, sIdx) { 
  openModal('editTimetable', { day, sIdx, cell: state.timetable.cells[`${day}-${sIdx}`] }); 
}

function addTimetableColumn() {
  const lastIdx = state.timetable.timeSlots.length - 1;
  const lastTime = state.timetable.timeSlots[lastIdx].time.split(' - ')[1];
  let [h, m] = lastTime.split(':').map(Number);
  m += 40;
  if (m >= 60) { h += Math.floor(m/60); m = m % 60; }
  const newTime = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  
  state.timetable.timeSlots.push({ time: `${lastTime} - ${newTime}`, type: 'lesson' });
  
  const newPeriodIdx = state.timetable.timeSlots.length - 1;
  state.timetable.days.forEach(day => {
    const subj = state.subjects[Math.floor(Math.random() * state.subjects.length)] || {name:'Free', profiles:{full_name:'-'}};
    state.timetable.cells[`${day}-${newPeriodIdx}`] = { 
      type: 'lesson', 
      subj: subj.name, 
      tea: subj.profiles?.full_name || '-' 
    };
  });
  renderPage(); 
  showToast('New period column added', 'success');
}

function addTimetableRow() {
  const nextDay = state.timetable.days.length;
  const days = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  if (nextDay >= days.length) return showToast('No more days to add', 'error');
  
  const dayName = days[nextDay];
  state.timetable.days.push(dayName);
  
  state.timetable.timeSlots.forEach((slot, sIdx) => {
    const key = `${dayName}-${sIdx}`;
    if (slot.type === 'break') {
      state.timetable.cells[key] = { type: 'break', label: slot.label };
    } else {
      const subj = state.subjects[Math.floor(Math.random() * state.subjects.length)] || {name:'Free', profiles:{full_name:'-'}};
      state.timetable.cells[key] = { 
        type: 'lesson', 
        subj: subj.name, 
        tea: subj.profiles?.full_name || '-' 
      };
    }
  });
  renderPage(); 
  showToast(`${dayName} added to timetable`, 'success');
}

function regenerateTimetable() {
  openConfirmModal('Regenerate Timetable', 'This will replace the entire current timetable. Continue?', () => {

function getGrade(m) {
  if(m >= 81) return "A";
  if(m >= 61) return "B";
  if(m >= 41) return "C";
  if(m >= 21) return "D";
  return "E";
}

function getGpa(g) {
  return {A:1,B:2,C:3,D:4,E:5}[g] || 5;
}

function formatSubjectName(name) {
  const map = {
    "Historia ya Tanzania na Maadili": "HIST.TZ",

}

async function onResultsClassChange() {
  currentResClass = document.getElementById('res-class-select').value;
  const pubBar = document.getElementById('publishBar');
  if (pubBar) pubBar.style.display = currentResClass ? 'flex' : 'none';
  
  await checkPublishStatus();
  await loadNectaReport();
}

async function checkPublishStatus() {
  if (!currentResClass) return;
  const { data } = await supabase.from('published_reports').select('*').eq('class_id', currentResClass).maybeSingle();
  isResPublished = data?.is_published || false;
  
  const pubBtn = document.getElementById('publishBtn');
  if (pubBtn) pubBtn.innerText = isResPublished ? 'UNPUBLISH' : 'PUBLISH';
  
  const statusEl = document.getElementById('res-status');
  if (!statusEl) return;
  
  if (state.currentUser.role === 'teacher' && !isResPublished) {
    statusEl.innerHTML = '<span style="color:red; font-weight:bold;">⚠ RESULTS ARE NOT YET PUBLISHED BY THE ACADEMIC TEACHER</span>';
  } else if (isResPublished) {
    statusEl.innerHTML = '<span style="color:green; font-weight:bold;">✅ RESULTS ARE PUBLISHED</span>';
  } else {
    statusEl.innerHTML = '';
  }
}

async function togglePublish() {
  if (!currentResClass) return;
  const newState = !isResPublished;
  const { error } = await supabase.from('published_reports').upsert({ class_id: currentResClass, is_published: newState }, { onConflict: 'class_id' });
  if (error) return showToast(error.message, 'error');
  
  await checkPublishStatus();
  await loadNectaReport();
  showToast(newState ? 'Results Published' : 'Results Unpublished', 'success');
}

function copyViewLink() {
  const link = `${window.location.origin}${window.location.pathname}?page=results&class=${currentResClass}`;
  navigator.clipboard.writeText(link);
  showToast('Link copied to clipboard', 'success');
}

async function loadNectaReport() {
  const dash = document.getElementById('necta-dashboard');
  if (!dash) return;
  
  if (!currentResClass) { 
    dash.innerHTML = '<p class="text-slate-500 text-center py-6">Select a class to view results.</p>'; 
    return; 
  }
  
  if (state.currentUser.role === 'teacher' && !isResPublished) {
    dash.innerHTML = '<p class="text-red-500 text-center py-6 font-bold">Results not published yet.</p>';
    return;
  }

  try {
    const students = state.students.filter(s => String(s.class_id) === String(currentResClass))
      .sort((a, b) => {
        if ((a.gender || "Male") !== (b.gender || "Male")) return (a.gender === "Female") ? 1 : -1;
        return (a.admission_no || a.name || "").localeCompare(b.admission_no || b.name || "");
      });

    let final = [];
    let gradePerf = { Male:{A:0,B:0,C:0,D:0,E:0}, Female:{A:0,B:0,C:0,D:0,E:0} };

    students.forEach(stu => {
      let total = 0, count = 0, detail = [];
      state.subjects.forEach(sub => {
        let r = state.results.find(x => String(x.student_id) === String(stu.id) && String(x.subject_id) === String(sub.id));
        if (!r) return;
        let m = Number(r.marks);
        total += m; count++;
        detail.push(formatSubjectName(sub.name) + " - " + getGrade(m));
      });

      if (count === 0) return;
      let avg = total / count;
      let g = getGrade(avg);
      detail.push("Average - " + g);
      
      let genderKey = "Male";
      if (stu.gender === "F" || stu.gender === "Female") {
        genderKey = "Female";
      }
      gradePerf[genderKey][g]++;

      final.push({
        adm: stu.admission_no || 'N/A',
        prem: stu.prem_no || 'N/A',
        name: stu.name || "-",
        sex: (stu.gender === "F" || stu.gender === "Female") ? "F" : "M",
        detail: detail.join(", ")
      });
    });

    const thStyle = 'border:2px solid #000; padding:5px; background:#e6e6e6; text-align:left;';
    const tdStyle = 'border:2px solid #000; padding:5px;';
    
    let gradePerfHtml = Object.entries(gradePerf).map(([k,v]) => `
      <tr><td style="${tdStyle}">${k}</td><td style="${tdStyle}">${v.A}</td><td style="${tdStyle}">${v.B}</td><td style="${tdStyle}">${v.C}</td><td style="${tdStyle}">${v.D}</td><td style="${tdStyle}">${v.E}</td></tr>
    `).join("");

    let tbodyHtml = final.length === 0 ? `<tr><td colspan="5" style="${tdStyle} text-align:center;">NO STUDENTS DATA</td></tr>` : final.map(r => `
      <tr><td style="${tdStyle}">${r.adm}</td><td style="${tdStyle}">${r.prem}</td><td style="${tdStyle}">${r.name}</td><td style="${tdStyle}">${r.sex}</td><td style="${tdStyle}">${r.detail}</td></tr>
    `).join("");

    let subjectStats = state.subjects.map(sub => {
      let st = state.results.filter(r => {
        if (String(r.subject_id) !== String(sub.id)) return false;
        return students.some(s => String(s.id) === String(r.student_id));
      });
      if (st.length === 0) return null;
      let total = st.reduce((a,b) => a + Number(b.marks), 0);
      let avg = total / st.length;
      return { name: sub.name, sat: st.length, passed: st.filter(x => x.marks >= 41).length, avg };
    }).filter(Boolean);

    let subtbodyHtml = subjectStats.length === 0 ? 
      `<tr><td colspan="7" style="${tdStyle} text-align:center;">NO SUBJECT PERFORMANCE DATA</td></tr>` :
      subjectStats.map((sub, i) => {
        let g = getGrade(sub.avg);
        let bgColor = "#fff", color = "#000";
        if(g==="A"){bgColor="#006400";color="#fff";} 
        else if(g==="B"){bgColor="#90EE90";color="#000";} 
        else if(g==="C"){bgColor="#FFFF66";color="#000";} 
        else if(g==="D"){bgColor="#FFB6B6";color="#000";} 
        else if(g==="E"){bgColor="#FF0000";color="#fff";}
        
        let gpaStyle = `border:2px solid #000; padding:5px; background:${bgColor}; color:${color}; text-align:center; font-weight:bold;`;
        
        return `
          <tr>
            <td style="${tdStyle}">${i+1}</td>
            <td style="${tdStyle}">${sub.name}</td>
            <td style="${tdStyle}">${sub.sat}</td>
            <td style="${tdStyle}">${sub.sat}</td>
            <td style="${tdStyle}">${sub.passed}</td>
            <td style="${tdStyle}">${sub.avg.toFixed(1)}</td>
            <td style="${gpaStyle}">${g}</td>
          </tr>
        `;
      }).join("");

    dash.innerHTML = `
      <div style="margin-bottom: 20px;">
        <h3 style="font-weight: bold; margin-bottom: 5px;">GRADE PERFORMANCE</h3>
        <table style="width: 100%; border-collapse: collapse; font-size: 12px; background: #fff; border: 2px solid #000;">
          <thead><tr><th style="${thStyle}">SEX</th><th style="${thStyle}">A</th><th style="${thStyle}">B</th><th style="${thStyle}">C</th><th style="${thStyle}">D</th><th style="${thStyle}">E</th></tr></thead>
          <tbody>${gradePerfHtml}</tbody>
        </table>
      </div>
      
      <div style="margin-bottom: 20px;">

async function saveResult(studentId, subjectId, marksStr, gradeCellId) {
  let marks = parseInt(marksStr);
  if (isNaN(marks)) marks = 0;
  if (marks < 0) marks = 0;
  if (marks > 100) marks = 100;

  const grade = getGrade(marks);
  const existing = state.results.find(r => r.student_id == studentId && r.subject_id == subjectId);

  if (existing) {
    const { error } = await supabase.from('results').update({ marks, grade }).eq('id', existing.id);
    if (error) return showToast(error.message, 'error');
    existing.marks = marks;
    existing.grade = grade;
    showToast('Result updated', 'success');
  } else {
    const { data, error } = await supabase.from('results').insert([{
      student_id: studentId,
      subject_id: subjectId,
      marks,
      grade,
      exam_name: 'Term II Assessment',
      term: 'Term II',
      year: '2025',
      published: false,
      created_by: state.currentUser.id
    }]).select().single();
    
    if (error) return showToast(error.message, 'error');
    state.results.push(data);
    showToast('Result saved', 'success');
  }
  
  const gradeCell = document.getElementById(gradeCellId);
  if (gradeCell) {
    gradeCell.innerHTML = `<span class="badge badge-blue">${grade}</span>`;
  }
}

function saveExamConfig(e) {
  e.preventDefault();
  const form = e.target;
  const key = form.dataset.key;
  const fd = new FormData(form);
  const obj = {};
  for(const [k,v] of fd.entries()) obj[k] = v;
  obj.defaultQuestions = parseInt(obj.defaultQuestions);
  obj.fontSize = parseInt(obj.fontSize);
  obj.lineSpacing = parseFloat(obj.lineSpacing);
  
  if (key === 'default') {
    state.examConfig.default = obj;
  } else {
    if (!state.examConfig.overrides) state.examConfig.overrides = {};
    state.examConfig.overrides[key] = obj;
  }
  
  localStorage.setItem('korosho_exam_config', JSON.stringify(state.examConfig));
  showToast('Settings saved', 'success');
  closeModal();
  renderPage();
}

  const customInstr = draft.customInstruction || 'Please write the paper structure instruction in the Exam Details section.';
  
  let questionsHtml = '';

  questions.forEach((q, i) => {
    if (q.type === 'section') {
      questionsHtml += `<div style="text-align: center; font-size: 16px; font-weight: bold; text-transform: uppercase; margin: 20px 0 15px; text-decoration: underline; page-break-inside: avoid;">${q.text || 'SECTION'}</div>`;
    } else {
      qCount++;
      questionsHtml += `<div style="margin-bottom: 20px; display: flex; page-break-inside: auto;">
        <span style="font-weight: bold; margin-right: 8px; min-width: 15px;">${qCount}.</span>
        <div style="flex: 1;">
          <div style="font-weight: bold; page-break-after: avoid;">
            ${q.text || 'Untitled question'} 
            <span style="float: right; font-weight: normal; font-size: 11px; color: #555;">(${q.marks||0} marks)</span>
          </div>`;
      
      if (q.subItems) {
        questionsHtml += `<div style="margin-top: 5px; font-size: 14px; white-space: pre-wrap; page-break-inside: avoid;">${q.subItems}</div>`;
      }

      if(q.type === 'mcq'){
        questionsHtml += `<div style="margin-top: 10px;">`;
        (q.items||[]).forEach((item, idx) => {
          questionsHtml += `<div style="margin-bottom: 10px; page-break-inside: avoid;">
            <div style="font-weight: normal; margin-bottom: 4px;">(${toRoman(idx+1)}) ${item.text || ''}</div>
            <div style="padding-left: 20px; font-size: 13px;">`;
          item.choices.forEach((opt, cIdx) => {
            if(opt) questionsHtml += `<div style="margin-bottom: 2px; page-break-inside: avoid;">${String.fromCharCode(65+cIdx)}) ${opt}</div>`;
          });
          questionsHtml += `</div></div>`;
        });
        questionsHtml += `</div>`;
      } else if (q.type === 'matching') {
        questionsHtml += `<table style="width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; page-break-inside: auto;">
          <thead style="display: table-header-group;"><tr><th style="border: 1px solid #000; padding: 5px; width: 50%; text-align: left;">Column A</th><th style="border: 1px solid #000; padding: 5px; width: 50%; text-align: left;">Column B</th></tr></thead>
          <tbody>
            ${(q.colA||[]).map((item, idx) => `
              <tr style="page-break-inside: avoid;">
                <td style="border: 1px solid #000; padding: 5px;">(${toRoman(idx+1)}) ${item}</td>
                <td style="border: 1px solid #000; padding: 5px;">${String.fromCharCode(65+idx)}. ${q.colB[idx] || ''}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;
      } else if (q.type === 'picture') {
        (q.pictures||[]).forEach(pic => {
          const alignStyle = pic.align === 'center' ? 'center' : (pic.align === 'right' ? 'flex-end' : 'flex-start');
          if (pic.url) {
            questionsHtml += `<div style="display: flex; justify-content: ${alignStyle}; margin: 10px 0; page-break-inside: avoid;"><img src="${pic.url}" style="width: ${pic.width}px; height: ${pic.height}px; object-fit: contain; border: 1px solid #ccc; padding: 4px;"/></div>`;
          } else {
            questionsHtml += `<div style="margin:10px 0;font-style:italic;color:#999;font-size:12px;">[No picture attached]</div>`;
          }
        });
        questionsHtml += `<div style="margin: 8px 0; border-bottom: 1px solid #000; height: 20px;"></div>`;
      } else if (q.type === 'short') {
        questionsHtml += `<div style="margin: 8px 0; border-bottom: 1px solid #000; height: 20px;"></div>`;
      } else if (q.type === 'long') {
        for(let l=0; l<4; l++) questionsHtml += `<div style="margin: 8px 0; border-bottom: 1px solid #000; height: 20px; page-break-inside: avoid;"></div>`;
      } else if (q.type === 'drawing') {
        questionsHtml += `<div style="margin:6px 0; border:1px solid #000; height: ${q.boxHeight||100}px; width: ${q.boxWidth||100}%; background:repeating-linear-gradient(45deg,#fff,#fff 10px,#f5f5f5 10px,#f5f5f5 20px); page-break-inside: avoid;"></div>`;
      }
      
      questionsHtml += `</div></div>`; 
    }
  });

  // --- NEW HEADER & BORDER DESIGN ---
  return `
    <div style="margin: 12mm; position: relative; font-family: Arial, Helvetica, sans-serif; color: #000;">
      
      <!-- Crop Marks (Light Gray L-Shapes) -->
      <div style="position: absolute; top: -2mm; left: -2mm; width: 5mm; height: 5mm; border-top: 1px solid #ccc; border-left: 1px solid #ccc; z-index: 10;"></div>
      <div style="position: absolute; top: -2mm; right: -2mm; width: 5mm; height: 5mm; border-top: 1px solid #ccc; border-right: 1px solid #ccc; z-index: 10;"></div>
      <div style="position: absolute; bottom: -2mm; left: -2mm; width: 5mm; height: 5mm; border-bottom: 1px solid #ccc; border-left: 1px solid #ccc; z-index: 10;"></div>
      <div style="position: absolute; bottom: -2mm; right: -2mm; width: 5mm; height: 5mm; border-bottom: 1px solid #ccc; border-right: 1px solid #ccc; z-index: 10;"></div>

      <!-- Outer Border (2px solid) -->
      <div style="border: 2px solid #000; padding: 3.5mm;">
        
        <!-- Inner Border (1px solid) -->
        <div style="border: 1px solid #000; padding: 20px; min-height: 240mm;">
          
          <!-- Header Layout (Grid for perfect centering) -->
          <div style="display: grid; grid-template-columns: 1fr 2fr 1fr; align-items: center; margin-bottom: 25px;">
            <div style="text-align: left;">
              <img src="${LOGO_URL}" alt="Logo" style="width: 75px; height: 75px; object-fit: contain;">
            </div>
            <div style="text-align: center;">
              <div style="font-size: 18px; font-weight: bold; text-transform: uppercase;">KOROSHO ENGLISH MEDIUM PRE & PRIMARY SCHOOL</div>
              <div style="font-size: 15px; font-weight: bold; margin-top: 5px;">P.O. Box 03 – TANDAHIMBA – MTWARA</div>
              <div style="font-size: 14px; font-weight: bold; margin-top: 3px;">TEL: +255715976760/+255623638683/+255655481995</div>
              <div style="font-size: 14px; font-weight: bold; margin-top: 3px;">EMAIL: <span style="color: #0000EE; text-decoration: underline;">koroshoschool@gmail.com</span></div>
            </div>
            <div></div> <!-- Empty spacer to balance the grid -->
          </div>

          <!-- Exam Title Block -->
          <div style="margin-top: 25px; text-align: center; margin-bottom: 35px;">
            <div style="font-size: 17px; font-weight: bold; text-transform: uppercase;">${examTitle}</div>
            <div style="font-size: 16px; font-weight: bold; text-transform: uppercase; margin-top: 5px;">${subjectName}</div>
            <div style="font-size: 16px; font-weight: bold; text-transform: uppercase; margin-top: 5px;">${className}</div>
          </div>

          <!-- Exam Info Row -->
          <div style="display: flex; justify-content: space-between; align-items: baseline; font-size: 16px; font-weight: bold; text-transform: uppercase;">
            <span>TIME: ${timeAllowed}</span>

function toRoman(num) {
  const romans = ["i", "ii", "iii", "iv", "v", "vi", "vii", "viii", "ix", "x", "xi", "xii"];
  return romans[num - 1] || num;
}

function updateExamPreview() {
  const previewDiv = document.getElementById('exam-live-preview');
  if (previewDiv) {
    const draft = state.examDraft;
    const c = getExamSettings(draft.classId);
    const questions = state.examQuestions;
    previewDiv.innerHTML = getExamPreviewHTML(draft, c, questions);
  }
}

function renderQuestionEditor(q, i) {
  const typeLabels = { mcq: 'Multiple Choice', short: 'Short Answer', long: 'Long Answer', drawing: 'Drawing', picture: 'Picture Question', section: 'Section Header', matching: 'Matching Items' };
  
  if (q.type === 'section') {
    return `<div class="question-block" style="background:#f1f5f9; border-style:dashed;">
      <div class="flex items-start justify-between mb-3">
        <span class="badge badge-gray">${typeLabels[q.type]}</span>
        <button class="icon-btn" style="width:32px;height:32px;" onclick="removeQuestion(${q.id})"><i class="fa-solid fa-trash text-xs text-red-500"></i></button>
      </div>
      <div class="mt-3">
        <label class="form-label">Section Title (Will be centered and bold)</label>
        <input type="text" class="form-input" style="text-align:center; font-weight:bold; text-transform:uppercase;" value="${q.text||''}" placeholder="e.g. SECTION A (20 Marks)" onchange="updateQuestionField(${q.id}, 'text', this.value)">
      </div>
    </div>`;
  }

  let extraFields = `<div class="mt-3"><label class="form-label">Question Text</label><textarea class="form-input" rows="2" placeholder="Enter main question..." onchange="updateQuestionField(${q.id}, 'text', this.value)">${q.text||''}</textarea></div>`;
  
  if (q.type === 'mcq') {
    extraFields += `<div class="mt-4 border-t pt-3">
      <label class="form-label">Multiple Choice Items</label>
      ${(q.items||[]).map((item, idx) => `
        <div class="p-3 bg-slate-50 rounded-lg mb-3 border">
          <div class="flex justify-between items-center mb-2">
            <span class="text-xs font-bold text-slate-600">Item (${toRoman(idx+1)})</span>
            <button class="icon-btn" style="width:28px;height:28px;" onclick="removeMcqItem(${q.id}, ${item.id})"><i class="fa-solid fa-trash text-xs text-red-500"></i></button>
          </div>
          <input type="text" class="form-input mb-2" style="padding:8px;font-size:13px;" value="${item.text}" placeholder="Item question..." onchange="updateMcqItem(${q.id}, ${item.id}, 'text', this.value)">
          <div class="space-y-2">
            ${item.choices.map((ch, cIdx) => `
              <div class="flex items-center gap-2">
                <span class="text-xs font-bold w-4">${String.fromCharCode(65+cIdx)}.</span>
                <input type="text" class="form-input flex-1" style="padding:6px;font-size:12px;" value="${ch}" placeholder="Choice ${cIdx+1}" onchange="updateMcqChoice(${q.id}, ${item.id}, ${cIdx}, this.value)">
                <button class="icon-btn" style="width:28px;height:28px;" onclick="removeMcqChoice(${q.id}, ${item.id}, ${cIdx})"><i class="fa-solid fa-xmark text-xs text-red-500"></i></button>
              </div>
            `).join('')}
          </div>
          <button class="btn-ghost" style="padding:4px 10px;font-size:11px;margin-top:4px;" onclick="addMcqChoice(${q.id}, ${item.id})"><i class="fa-solid fa-plus mr-1"></i> Add Choice</button>
        </div>
      `).join('')}
      <button class="btn-ghost" style="padding:6px 12px;font-size:12px;" onclick="addMcqItem(${q.id})"><i class="fa-solid fa-plus mr-1"></i> Add Item</button>
    </div>`;
  } else if (q.type === 'matching') {
    extraFields += `
      <div class="mt-3 grid grid-cols-2 gap-4">
        <div>
          <label class="form-label">Column A (Items)</label>
          ${q.colA.map((item, idx) => `<div class="flex items-center gap-2 mb-2"><input type="text" class="form-input flex-1" style="padding:8px 12px;font-size:13px;" value="${item}" placeholder="Item ${idx+1}" onchange="updateMatchingCol(${q.id}, 'A', ${idx}, this.value)"><button class="icon-btn" style="width:32px;height:32px;" onclick="removeMatchingRow(${q.id}, ${idx})"><i class="fa-solid fa-xmark text-xs"></i></button></div>`).join('')}
          <button class="btn-ghost" style="padding:6px 12px;font-size:12px;" onclick="addMatchingRow(${q.id})"><i class="fa-solid fa-plus mr-1"></i> Add Row</button>
        </div>
        <div>
          <label class="form-label">Column B (Answers)</label>
          ${q.colB.map((item, idx) => `<div class="flex items-center gap-2 mb-2"><input type="text" class="form-input flex-1" style="padding:8px 12px;font-size:13px;" value="${item}" placeholder="Match ${idx+1}" onchange="updateMatchingCol(${q.id}, 'B', ${idx}, this.value)"><button class="icon-btn" style="width:32px;height:32px;" onclick="removeMatchingRow(${q.id}, ${idx})"><i class="fa-solid fa-xmark text-xs"></i></button></div>`).join('')}
        </div>
      </div>
    `;
  } else if (q.type === 'picture') {
    extraFields += `
      <div class="space-y-2 mt-3">
        <label class="form-label">Sub-items (e.g., (i) What is this? (ii) Name the part)</label>
        <textarea class="form-input" rows="2" placeholder="Enter sub-items..." onchange="updateQuestionField(${q.id}, 'subItems', this.value)">${q.subItems||''}</textarea>
        
        <label class="form-label">Attached Pictures</label>
        ${(q.pictures||[]).map((pic, idx) => `
          <div class="p-3 border rounded-lg mb-2" style="background:#fff;">
            <div class="flex items-center gap-2 mb-2">
              <input type="file" accept="image/*" class="text-xs flex-1" onchange="uploadPictureImage(${q.id}, ${idx}, this)">
              <button class="icon-btn" style="width:32px;height:32px;" onclick="removePictureImage(${q.id}, ${idx})"><i class="fa-solid fa-trash text-xs text-red-500"></i></button>
            </div>
            ${pic.url ? `<img src="${pic.url}" style="max-height:80px;border:1px solid var(--border);border-radius:4px;">` : ''}

              <input type="number" class="form-input" style="padding:6px;font-size:12px;" value="${pic.width}" placeholder="W (px)" onchange="updatePictureSetting(${q.id}, ${idx}, 'width', this.value)">

              <select class="form-input" style="padding:6px;font-size:12px;" onchange="updatePictureSetting(${q.id}, ${idx}, 'align', this.value)">

                <option value="center" ${pic.align==='center'?'selected':''}>Center</option>
                <option value="right" ${pic.align==='right'?'selected':''}>Right</option>
              </select>
            </div>
          </div>
        `).join('')}
        <button class="btn-ghost" style="padding:6px 12px;font-size:12px;" onclick="addPictureImage(${q.id})"><i class="fa-solid fa-plus mr-1"></i> Add Image Slot</button>
      </div>
    `;
  } else if (q.type === 'drawing') {
    extraFields += `
      <div class="space-y-2 mt-3">
        <label class="form-label">Sub-items (e.g., (i) Draw the map (ii) Label it)</label>
        <textarea class="form-input" rows="2" placeholder="Enter sub-items..." onchange="updateQuestionField(${q.id}, 'subItems', this.value)">${q.subItems||''}</textarea>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="form-label">Box Height (px)</label><input type="number" class="form-input" value="${q.boxHeight||100}" onchange="updateQuestionField(${q.id}, 'boxHeight', this.value)"></div>
          <div><label class="form-label">Box Width (%)</label><input type="number" class="form-input" value="${q.boxWidth||100}" onchange="updateQuestionField(${q.id}, 'boxWidth', this.value)"></div>
        </div>
      </div>
    `;
  }
  
  return `<div class="question-block"><div class="flex items-start justify-between mb-3"><span class="badge badge-blue">${typeLabels[q.type]}</span><button class="icon-btn" style="width:32px;height:32px;" onclick="removeQuestion(${q.id})"><i class="fa-solid fa-trash text-xs text-red-500"></i></button></div>${extraFields}<div class="mt-3"><label class="form-label">Marks</label><input type="number" class="form-input" value="${q.marks||1}" onchange="updateQuestionField(${q.id}, 'marks', this.value)"></div></div>`;
}

function addQuestion(type) { 
  const id = Date.now(); 
  const newQ = { id, type, text: '', marks: 5 }; 
  if (type === 'mcq') newQ.items = [{ id: Date.now()+1, text: '', choices: ['', ''] }]; 
  if (type === 'matching') { newQ.colA = ['', '']; newQ.colB = ['', '']; }
  if (type === 'picture') newQ.pictures = [];
  if (type === 'drawing') { newQ.boxHeight = 100; newQ.boxWidth = 100; }
  
  state.examQuestions.push(newQ); 
  state.examDraft.isDirty = true;
  renderPage(); 
  showToast('Question added', 'success'); 
}

function updateQuestionField(id, field, val) { 
  const q = state.examQuestions.find(x => x.id === id); 
  if (q) {
    q[field] = val; 
    state.examDraft.isDirty = true;
    updateExamPreview();
  } 
}

// --- MCQ HELPERS ---
function addMcqItem(qId) {
  const q = state.examQuestions.find(x => x.id === qId);
  if (q && q.type === 'mcq') { q.items.push({ id: Date.now(), text: '', choices: ['', ''] }); state.examDraft.isDirty = true; renderPage(); }
}
function removeMcqItem(qId, itemId) {
  const q = state.examQuestions.find(x => x.id === qId);
  if (q && q.type === 'mcq') { q.items = q.items.filter(item => item.id !== itemId); state.examDraft.isDirty = true; renderPage(); }
}
function updateMcqItem(qId, itemId, field, val) {
  const q = state.examQuestions.find(x => x.id === qId);
  if (q && q.type === 'mcq') {
    const item = q.items.find(it => it.id === itemId);
    if (item) { item[field] = val; state.examDraft.isDirty = true; updateExamPreview(); }
  }
}
function updateMcqChoice(qId, itemId, cIdx, val) {
  const q = state.examQuestions.find(x => x.id === qId);
  if (q && q.type === 'mcq') {
    const item = q.items.find(it => it.id === itemId);
    if (item) { item.choices[cIdx] = val; state.examDraft.isDirty = true; updateExamPreview(); }
  }
}
function addMcqChoice(qId, itemId) {
  const q = state.examQuestions.find(x => x.id === qId);
  if (q && q.type === 'mcq') {
    const item = q.items.find(it => it.id === itemId);
    if (item) { item.choices.push(''); state.examDraft.isDirty = true; renderPage(); }
  }
}
function removeMcqChoice(qId, itemId, cIdx) {
  const q = state.examQuestions.find(x => x.id === qId);
  if (q && q.type === 'mcq') {
    const item = q.items.find(it => it.id === itemId);
    if (item && item.choices.length > 1) { item.choices.splice(cIdx, 1); state.examDraft.isDirty = true; renderPage(); }
  }
}

// --- MATCHING HELPERS ---
function addMatchingRow(qId) { 
  const q = state.examQuestions.find(x => x.id === qId); 
  if (q) { q.colA.push(''); q.colB.push(''); state.examDraft.isDirty = true; renderPage(); } 
}
function removeMatchingRow(qId, idx) { 
  const q = state.examQuestions.find(x => x.id === qId); 
  if (q) { q.colA.splice(idx, 1); q.colB.splice(idx, 1); state.examDraft.isDirty = true; renderPage(); } 
}
function updateMatchingCol(qId, col, idx, val) { 
  const q = state.examQuestions.find(x => x.id === qId); 
  if (q) {
    if (col === 'A') q.colA[idx] = val; else q.colB[idx] = val;
    state.examDraft.isDirty = true;
    updateExamPreview();
  } 
}

// --- PICTURE HELPERS ---
function addPictureImage(qId) {
  const q = state.examQuestions.find(x => x.id === qId);
  if (q) { q.pictures.push({ url: '', width: 150, height: 150, align: 'center' }); state.examDraft.isDirty = true; renderPage(); }
}
function removePictureImage(qId, idx) {
  const q = state.examQuestions.find(x => x.id === qId);
  if (q) { q.pictures.splice(idx, 1); state.examDraft.isDirty = true; renderPage(); }
}
function updatePictureSetting(qId, idx, key, val) {
  const q = state.examQuestions.find(x => x.id === qId);
  if (q && q.pictures[idx]) {
    q.pictures[idx][key] = val;
    state.examDraft.isDirty = true;
    updateExamPreview();
  }
}
function uploadPictureImage(qId, idx, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const q = state.examQuestions.find(x => x.id === qId);
    if (q && q.pictures[idx]) {
      q.pictures[idx].url = e.target.result;
      state.examDraft.isDirty = true;
      renderPage();
      showToast('Picture attached', 'success');
    }
  };
  reader.readAsDataURL(file);
}

function addChoice(qid) { const q = state.examQuestions.find(x => x.id === qid); if (q) { q.choices.push(''); state.examDraft.isDirty = true; renderPage(); } }
function removeChoice(qid, idx) { const q = state.examQuestions.find(x => x.id === qid); if (q) { q.choices.splice(idx, 1); state.examDraft.isDirty = true; renderPage(); } }
function removeQuestion(id) { openConfirmModal('Remove Question', 'Are you sure?', () => { state.examQuestions = state.examQuestions.filter(q => q.id !== id); state.examDraft.isDirty = true; renderPage(); showToast('Question removed', 'info'); closeModal(); }); }

function reviewExamPrint(examId) {
  const exam = state.exams.find(e => e.id === examId);
  if (!exam) return;
  printExamPaper(exam);
}

async function printExamPaper(exam = null) {
  const draft = exam ? { classId: exam.class_id, subjectId: exam.subject_id, title: exam.title } : state.examDraft;
  const c = getExamSettings(draft.classId);
  const questions = exam ? exam.questions : state.examQuestions;
  
  // 1. Generate the Exam HTML
  const examHTML = getExamPreviewHTML(draft, c, questions);

  // 2. Create a Standalone HTML Document with a Print Button
  const fullHTML = `
    <!DOCTYPE html>
    <html>
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Print Exam</title>
      <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background: #e2e8f0; }
        .print-btn-container { text-align: center; margin: 20px 0; }
        .print-btn { 
          padding: 15px 30px; background: #047857; color: white; border: none; 
          border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; 
          box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .paper-wrapper { background: white; padding: 20px; max-width: 800px; margin: 0 auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        @media print {
          body { background: white; padding: 0; }
          .print-btn-container { display: none !important; }
          .paper-wrapper { box-shadow: none; max-width: 100%; padding: 0; margin: 0; }
          @page { size: A4; margin: 10mm; }
        }
      </style>
    </head>
    <body>
      <div class="print-btn-container">
        <button class="print-btn" onclick="window.print()">Print / Save as PDF</button>
      </div>
      <div class="paper-wrapper">${examHTML}</div>
    </body>
    </html>
  `;

  // 3. Open the clean HTML in a new tab
  const blob = new Blob([fullHTML], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  
  const a = document.createElement('a');
  a.href = url;
  a.target = '_blank';
  a.rel = 'noopener';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  
  setTimeout(() => URL.revokeObjectURL(url), 1000);

  // 4. Save to Supabase (Only if dirty or if it's a new exam)
  if (!exam && state.examQuestions.length > 0) {
    if (!state.examDraft.isDirty) {
      showToast('No changes made. Print opened, but no new copy sent to Admin.', 'info');
      return;
    }

    showToast('Sending copy to Admin for review...', 'info');
    const questionsToSave = state.examQuestions.map(q => {
      const cleanQ = { ...q };
      if (cleanQ.type === 'picture' && cleanQ.pictures) {
        cleanQ.pictures.forEach(pic => pic.url = '');
      }
      return cleanQ;
    });

    supabase.from('exams').insert([{
      title: draft.title || 'Untitled Exam',
      class_id: draft.classId,
      subject_id: draft.subjectId,
      questions: questionsToSave,
      created_by: state.currentUser.id
    }]).then(({ error }) => {
      if (error) {
        showToast('Failed to send for review: ' + error.message, 'error');
      } else {
        showToast('Copy sent to Admin for review.', 'success');
        state.examDraft.isDirty = false; // Mark as clean/saved
        fetchAllData();
      }
    });
  }
}

async function saveStudent() {
  const name = document.getElementById('s-name').value.trim();
  if (!name) return showToast('Please enter student name', 'error');
  const { error } = await supabase.from('students').insert([{
    name, class_id: document.getElementById('s-class').value, gender: document.getElementById('s-gender').value,
    age: Number(document.getElementById('s-age').value), parent_name: document.getElementById('s-parent').value,
    parent_phone: document.getElementById('s-phone').value
  }]);
  if (error) return showToast(error.message, 'error');
  closeModal(); await fetchAllData(); renderPage(); showToast(`Student ${name} enrolled`, 'success');
}

async function saveClass() {
  const name = document.getElementById('c-name').value.trim();
  if (!name) return showToast('Please enter class name', 'error');
  const { error } = await supabase.from('classes').insert([{ name, room: document.getElementById('c-room').value }]);
  if (error) return showToast(error.message, 'error');
  closeModal(); await fetchAllData(); renderPage(); showToast(`Class ${name} created`, 'success');
}

async function saveTeacher() {
  const email = document.getElementById('t-email').value.trim();
  const password = document.getElementById('t-password').value;
  const fullName = document.getElementById('t-name').value.trim();
  const phone = document.getElementById('t-phone').value.trim();
  const role = document.getElementById('t-role').value;

  if (!email || !password || !fullName) return showToast('Please fill all required fields', 'error');

  const { data: { session: adminSession } } = await supabase.auth.getSession();
  if (!adminSession) return showToast('Admin session lost. Please log in again.', 'error');

  const { data: authData, error: authError } = await supabase.auth.signUp({ email, password });
  if (authError) {
    return showToast('Auth Error: ' + authError.message, 'error');
  }

  await supabase.auth.setSession({
    access_token: adminSession.access_token,
    refresh_token: adminSession.refresh_token
  });

  const { error: profileError } = await supabase.from('profiles').insert([{
    id: authData.user.id,
    full_name: fullName,
    email: email,
    phone: phone,
    role: role
  }]);

  if (profileError) {
    showToast('Auth created, but profile failed: ' + profileError.message, 'error');
  } else {
    showToast(`${role} added successfully!`, 'success');
    closeModal();
    await fetchAllData();
    renderPage();
  }
}

async function assignTeacher(clsId) {
  const teacherId = document.getElementById('assign-teacher').value;
  const { error } = await supabase.from('classes').update({ class_teacher_id: teacherId || null }).eq('id', clsId);
  if (error) return showToast(error.message, 'error');
  closeModal(); await fetchAllData(); renderPage(); showToast('Class teacher assigned', 'success');
}

async function saveSubject() {

  const { error } = await supabase.from('subjects').insert([{ name, code: document.getElementById('sub-code').value, teacher_id: document.getElementById('sub-teacher').value }]);
  if (error) return showToast(error.message, 'error');

async function saveNotice() {
  const title = document.getElementById('n-title').value.trim(), body = document.getElementById('n-body').value.trim();

  const { error } = await supabase.from('notices').insert([{ title, body, priority: document.getElementById('n-priority').value, author_id: state.currentUser.id }]);
  if (error) return showToast(error.message, 'error');
  closeModal(); await fetchAllData(); renderPage(); showToast('Announcement posted', 'success');
}

function showToast(message, type = 'success') {
  const host = document.getElementById('toastHost');
  const icons = { success: 'fa-circle-check text-emerald-500', error: 'fa-circle-xmark text-red-500', info: 'fa-circle-info text-blue-500', warn: 'fa-triangle-exclamation text-amber-500' };
  const toast = document.createElement('div');
  toast.className = `toast ${type === 'success' ? '' : type}`;
  toast.innerHTML = `<i class="fa-solid ${icons[type] || icons.success} text-lg"></i><div class="flex-1 text-sm font-medium text-slate-800">${message}</div><button onclick="this.parentElement.remove()" class="text-slate-400 hover:text-slate-700"><i class="fa-solid fa-xmark"></i></button>`;
  host.appendChild(toast);
  setTimeout(() => { toast.style.animation = 'slideIn 0.3s ease-out reverse'; setTimeout(() => toast.remove(), 280); }, 3000);
}
