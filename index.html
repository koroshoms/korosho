async function autoAssignSubjects() {
  const classId = assignmentDraft.classId;
  if (!classId) return;
  
  // Pata masomo yote yaliyowekwa kwenye dashboard kwa darasa hili
  const subjectsForClass = state.subjects.filter(sub => sub.class_ids && sub.class_ids.includes(parseInt(classId)));
  
  if (subjectsForClass.length === 0) {
    return showToast('No subjects assigned to this class from the Subjects page yet. Please add them first.', 'warn');
  }
  
  showToast('Syncing subjects to this class...', 'info');
  
  for (const subject of subjectsForClass) {
    // Weka kwenye class_subjects ikiwa halipo bila kuduplicate
    await supabase.from('class_subjects').upsert([{ 
      class_id: classId, 
      subject_id: subject.id 
    }], { onConflict: 'class_id,subject_id', ignoreDuplicates: true });
  }
  
  // Refresh state kutoka kwenye database ili kuwa na data sahihi
  const { data: updatedAssignments } = await supabase.from('class_subjects').select('*').eq('class_id', classId);
  state.classSubjects = state.classSubjects.filter(a => a.class_id != classId);
  if (updatedAssignments) state.classSubjects.push(...updatedAssignments);
  
  showToast('Subjects synced successfully! Now assign teachers and periods.', 'success');
  renderPage();
}
  
async function saveAssignmentMeta(subjectId, field, value) {
  const classId = assignmentDraft.classId;
  let existing = state.classSubjects.find(a => a.class_id == classId && a.subject_id == subjectId);
  
  if (!existing) {
    const { data, error } = await supabase.from('class_subjects').insert([{ 
      class_id: classId, subject_id: subjectId, teacher_id: null, periods_per_week: 0, double_periods_per_week: 0 
    }]).select().single();
    if (error) return showToast(error.message, 'error');
    state.classSubjects.push(data);
    existing = data;
  }
  
  const updateObj = {};
  updateObj[field] = parseInt(value) || 0;
  
  const { error } = await supabase.from('class_subjects').update(updateObj).eq('id', existing.id);
  if (error) return showToast(error.message, 'error');
  existing[field] = parseInt(value) || 0;
}

async function clearClassSubjects() {
  const classId = assignmentDraft.classId;
  if (!classId) return;
  
  openConfirmModal('Clear Subjects', 'Are you sure you want to remove ALL subjects linked to this class?', async () => {
    const { error } = await supabase.from('class_subjects').delete().eq('class_id', classId);
    if (error) return showToast('Error clearing subjects: ' + error.message, 'error');
    
    // Futa kwenye state ya local
    state.classSubjects = state.classSubjects.filter(a => a.class_id != classId);
    
    closeModal();
    renderPage();
    showToast('All subjects cleared for this class.', 'success');
  });
}
 // ===== GENERATE ALL CLASS TIMETABLES (MASTER SCHEDULER) =====
function generateAllTimetables() {
  state.timetables = {};
  state.teacherSchedules = {}; // Futa kumbukumbu za walimu ili kuanza upya
  
  // Unda ratiba kwa kila darasa kwa kuzingatia uwepo wa walimu
  state.classes.forEach(cls => {
    generateTimetable(cls.id);
  });
  
  showToast('All timetables generated successfully! No teacher clashes.', 'success');
} 

// ===== SPLASH SCREEN LOGIC =====
function hideSplashScreen() {
  const splash = document.getElementById('splashScreen');
  if (splash) {
    splash.classList.add('fade-out');
    setTimeout(() => {
      splash.style.display = 'none';
    }, 800);
  }
}

window.addEventListener('load', () => {
  // Weka link ya logo kwenye splash screen
  const splashLogo = document.getElementById('splashLogo');
  if (splashLogo && typeof LOGO_URL !== 'undefined') {
    splashLogo.src = LOGO_URL;
  }
  
  // Ficha splash screen baada ya sekunde 2.5
  setTimeout(hideSplashScreen, 2500);
});
  
  checkSession();
// ===== PWA SERVICE WORKER REGISTRATION =====
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(registration => {
      console.log('ServiceWorker registration successful with scope: ', registration.scope);
    }).catch(err => {
      console.log('ServiceWorker registration failed: ', err);
    });
  });
}
