<!DOCTYPE html>
<html>
<head>
    <title>Supabase Login Test</title>
    <!-- Load Supabase here -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h2>Login Test</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="doLogin()">Login</button>
    <p id="status" style="color: blue; font-weight: bold;"></p>

    <script>
        // 1. Check if Supabase loaded
        let supabase;
        if (window.supabase) {
            try {
                const SUPABASE_URL = 'https://svlcwdxwnrrwoesjnklj.supabase.co';
                const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2bGN3ZHh3bnJyd29lc2pua2xqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5NTY1NjUsImV4cCI6MjA5ODUzMjU2NX0.5AawITGCbHFuZFGMOsLocgPL3IZoZRtKpcNOtRhcLtY';
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                document.getElementById('status').innerText = 'Supabase loaded successfully. Ready to login.';
            } catch (e) {
                document.getElementById('status').innerText = 'Error initializing Supabase: ' + e.message;
            }
        } else {
            document.getElementById('status').innerText = 'ERROR: Supabase library did not load. Check your internet or adblocker.';
        }

        // 2. The Login Function
        async function doLogin() {
            alert('Button clicked! Function is running...'); // This will prove the click works
            
            if (!supabase) {
                document.getElementById('status').innerText = 'Cannot login, Supabase is not loaded.';
                return;
            }

            document.getElementById('status').innerText = 'Attempting login...';
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                document.getElementById('status').innerText = 'SUCCESS! User ID: ' + data.user.id;
            } catch (err) {
                document.getElementById('status').innerText = 'FAILED: ' + err.message;
            }
        }
    </script>
</body>
</html>
